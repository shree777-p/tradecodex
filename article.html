  "introduction-to-financial-markets": {
    lede: "A financial market is any venue — physical or electronic — where people buy and sell claims on value: shares of a company, a currency, a loan, a barrel of oil's future price. This entry is the starting point for the whole Codex.",
    body: `
      <h2 id="what">What a financial market actually does</h2>
      <p>Strip away the terminology and a financial market does one job: it connects someone who wants to buy an asset with someone who wants to sell it, and it settles on a price both sides accept in that moment. That price is not set by an authority — it emerges from the collective decisions of every buyer and seller acting on their own information and expectations.</p>
      <p>This matters because it means a market price is a live opinion, not a fact. It reflects what participants currently believe an asset is worth, which is why prices move constantly as new information — earnings, interest rate decisions, geopolitical events — reaches the people trading.</p>

      <h2 id="why">Why markets exist</h2>
      <p>Markets solve a practical problem: a company that wants to build a factory needs capital before it has earned the revenue to pay for it. A financial market lets that company raise money today from investors, in exchange for a share of future ownership (equity) or a promise to repay with interest (debt).</p>
      <p>For the investor side, markets offer somewhere to put savings to work rather than letting them sit idle, with the possibility of growing in value over time — in exchange for accepting the risk that the investment can also lose value.</p>

      <h2 id="types">The main types of financial markets</h2>
      <p>Most financial activity falls into a handful of broad markets:</p>
      <p><strong>Equity markets</strong> — where shares of companies are bought and sold, giving investors partial ownership.</p>
      <p><strong>Debt markets</strong> — where governments and companies borrow money by issuing bonds, promising fixed interest over time.</p>
      <p><strong>Currency (forex) markets</strong> — where one country's currency is exchanged for another, the largest market in the world by daily turnover.</p>
      <p><strong>Commodity markets</strong> — where physical goods like gold, crude oil, or agricultural produce are traded, often through <span class="glossary-term" data-term="Derivative" data-def="A contract whose value is derived from an underlying asset, such as a future or option.">derivative</span> contracts rather than physical delivery.</p>
      <p><strong>Derivatives markets</strong> — where contracts like <span class="glossary-term" data-term="Futures" data-def="A standardized contract to buy or sell an asset at a set price on a future date.">futures</span> and options are traded, whose value is based on an underlying asset.</p>

      <h2 id="participants">Who participates</h2>
      <p>Markets bring together several distinct kinds of participants: individual retail traders and investors, institutional investors such as mutual funds and pension funds, market makers who provide liquidity by continuously quoting buy and sell prices, and regulators who set the rules everyone else operates under. Each entry in the <a href="article.html?slug=market-participants">Market Participants</a> section covers one of these roles in detail.</p>

      <h2 id="next">Where to go next</h2>
      <p>From here, the natural next entry is the <a href="article.html?slug=history-of-markets">History of Markets</a>, which explains how today's exchanges evolved from physical trading floors — followed by <a href="article.html?slug=what-is-trading">What Is Trading</a>, which draws the line between trading and investing.</p>
    `

  "history-of-markets": {
    lede: "Modern exchanges look like they run on pure technology, but the rules underneath them — continuous price discovery, standardized contracts, a central place to meet — are close to 400 years old. India's own exchanges are younger than most people assume.",
    body: `
      <h2 id="first">The first stock exchange</h2>
      <p>Formal, tradable shares begin with the Dutch East India Company (VOC) in 1602. To fund voyages too expensive and risky for any single merchant, the VOC sold ownership stakes to the public and let investors trade those stakes among themselves in Amsterdam — creating, in effect, the first stock exchange and the first shares as we'd recognize them today.</p>

      <h2 id="coffeehouses">From coffee houses to formal exchanges</h2>
      <p>London's stock market grew informally out of coffee houses in the late 1600s, where brokers met to trade shares and government debt before the London Stock Exchange was formally constituted in 1801. In the United States, a similar pattern played out under a buttonwood tree on Wall Street, where 24 brokers signed the Buttonwood Agreement in 1792, setting shared trading rules that became the basis for the New York Stock Exchange.</p>
      <p>In each case, the same problem was being solved: informal, ad-hoc deals didn't scale. Traders needed a fixed place, agreed rules, and a way to trust that the other side of a trade would actually deliver.</p>

      <h2 id="india">India's market history</h2>
      <p>India's market history starts earlier than most people expect. Stockbrokers were trading informally under a banyan tree near what is now Mumbai's Horniman Circle as far back as the 1850s. That informal gathering became the <a href="article.html?slug=bse">Bombay Stock Exchange (BSE)</a> in 1875, making it Asia's oldest stock exchange.</p>
      <p>For over a century, BSE operated as an open-outcry market — brokers physically shouting and signaling orders on a trading floor. This changed with two developments in the 1990s: the establishment of <span class="glossary-term" data-term="SEBI" data-def="The Securities and Exchange Board of India, the regulator that oversees Indian securities markets.">SEBI</span> as a statutory regulator in 1992, and the launch of the <a href="article.html?slug=nse">National Stock Exchange (NSE)</a> the same year with fully electronic, screen-based trading — a structural leap that pushed the rest of the industry to modernize.</p>
      <p>1996 brought dematerialization: the shift from paper share certificates to electronic holdings via depositories (NSDL and later CDSL), which removed the settlement risk and fraud that paper certificates carried and made same-day electronic settlement possible.</p>

      <h2 id="electronic">From trading floors to algorithms</h2>
      <p>The broader shift from physical trading floors to electronic order matching happened globally through the 1990s and 2000s, and it changed who could participate — a retail trader with an internet connection could now place an order that competed on equal footing with a large institution's order, at least in terms of how it reached the exchange. This same infrastructure later enabled algorithmic and high-frequency trading, where computer programs place and cancel orders in fractions of a second.</p>

      <h2 id="next">Where to go next</h2>
      <p>With this historical grounding, <a href="article.html?slug=what-is-trading">What Is Trading</a> defines the activity itself, before <a href="article.html?slug=investment-vs-trading">Investment vs Trading</a> separates it clearly from investing.</p>
    `

  "what-is-trading": {
    lede: "Trading is the practice of buying and selling financial instruments with the primary goal of profiting from price changes over a relatively short holding period — as opposed to holding an asset for years to benefit from its long-term growth.",
    body: `
      <h2 id="define">Defining trading</h2>
      <p>Every trade has the same underlying structure: a trader forms a view on where a price is heading, opens a position that profits if that view is correct, and closes it once the target is hit, the view is proven wrong, or a predetermined time has passed. What makes it "trading" rather than "investing" is the time horizon and the reasoning behind it — a trader is usually reacting to price behavior, news, or short-term supply and demand, not to a company's ten-year growth prospects.</p>

      <h2 id="how">How a trade actually happens</h2>
      <p>Building on the market mechanics covered in <a href="article.html?slug=introduction-to-financial-markets">Introduction to Financial Markets</a>: a trader places an order through a broker, that order reaches the exchange, and it's matched against an opposing order at an agreed price. The <a href="article.html?slug=order-types">Order Types</a> entry covers the different ways that order can be structured — but at its simplest, a trade is just one decision to buy, paired with a later decision to sell.</p>

      <h2 id="long-short">Long and short positions</h2>
      <p>A trader who buys first, expecting the price to rise, is "going long." A trader can also profit from a falling price by "going short" — borrowing shares, selling them immediately, and buying them back later at a lower price to return what was borrowed, pocketing the difference. Short selling carries distinct risks (a rising price produces, in theory, unlimited loss) and specific rules depending on the market, which later entries cover in detail.</p>

      <h2 id="skill">What separates trading from gambling</h2>
      <p>The comparison to gambling comes up often, and it's worth addressing directly. A single trade, viewed in isolation, does resemble a bet: an uncertain outcome, capital at risk, a binary-feeling result. What separates a trading <em>practice</em> from gambling is process — a trader who defines risk before entering a position, sizes that position deliberately, and applies the same method across many trades is playing a game of probabilities where a real, learnable edge can exist over time. Someone placing trades on impulse, without a plan or risk control, is functionally gambling regardless of what asset they're trading. The <a href="article.html?slug=risk-management">Risk Management</a> and <a href="article.html?slug=trading-psychology">Trading Psychology</a> sections go into this distinction in depth.</p>

      <h2 id="styles">A first look at trading styles</h2>
      <p>Not all trading happens on the same timeframe. <a href="article.html?slug=intraday-trading">Intraday trading</a> opens and closes positions within a single day; <a href="article.html?slug=swing-trading">swing trading</a> holds for days to weeks; <a href="article.html?slug=positional-trading">positional trading</a> holds for weeks to months. Each style suits a different amount of available time, capital, and temperament — the <a href="article.html?slug=intraday-trading">Trading Styles</a> section walks through how to choose.</p>

      <h2 id="next">Where to go next</h2>
      <p>Next: <a href="article.html?slug=investment-vs-trading">Investment vs Trading</a>, which lays the two approaches side by side.</p>
    `

    body: `
      <h2 id="core">The core distinction</h2>
      <p>An investor buys an asset expecting its underlying value to grow over years, largely tuning out day-to-day price movement. A trader buys and sells over much shorter windows, actively responding to price movement itself. Neither approach is "better" in the abstract — they answer different questions and demand different amounts of time and attention.</p>

      <table style="width:100%; border-collapse:collapse; margin:18px 0; font-size:.88rem;">

      <h2 id="analysis">Which analysis each relies on more</h2>
      <p><a href="article.html?slug=fundamental-analysis">Fundamental analysis</a> — studying a company's financial health, competitive position, and growth prospects — tends to drive investing decisions, since it's built to answer "is this worth owning for years." <a href="article.html?slug=technical-analysis">Technical analysis</a> — studying price charts and patterns — tends to drive trading decisions, since it's built to answer "where is this price likely to go next." Most experienced market participants use both, in different proportions depending on what they're deciding.</p>

      <h2 id="risk">Risk and activity level</h2>
      <p>Trading generally carries higher risk per unit of time, because shorter holding periods mean less room for a position to recover from being wrong, and because frequent trading multiplies transaction costs and tax events. Investing spreads risk over a longer runway, giving a fundamentally sound asset more time to work through short-term volatility — though it isn't risk-free, and a poorly chosen investment can still lose value permanently.</p>

      <h2 id="hybrid">Can you do both?</h2>
      <p>Yes, and most serious market participants eventually do — holding a core long-term portfolio while trading a smaller, clearly separated portion of capital. The mistake to avoid is blending the two mentally: turning a long-term investment into a panic sale on a bad day, or turning a short-term trade into a "long-term hold" simply because it moved against you and you don't want to realize the loss.</p>

      <h2 id="next">Where to go next</h2>
      <p>Next: <a href="article.html?slug=stock-market-basics">Stock Market Basics</a>, which introduces the vocabulary — shares, market cap, circuits — used throughout the rest of the Codex.</p>
    `

  "stock-market-basics": {
    lede: "Before any chart, indicator, or strategy makes sense, a handful of basic terms need to be second nature: what a share is, how its price is quoted, and what actually happens when that price moves too far, too fast.",
    body: `
      <h2 id="share">What a share represents</h2>
      <p>A share is a unit of ownership in a company. Owning one share of a company with 10 crore shares outstanding means owning one ten-crore-th of that company — a proportional claim on its profits (via dividends, if declared) and, in principle, a vote on major company decisions. Share prices move based on how the market's collective expectation of the company's future changes, not on the company's past performance alone.</p>

      <h2 id="mcap">Market capitalization</h2>
      <p>Market capitalization ("market cap") is a company's share price multiplied by its total number of outstanding shares — a rough proxy for the company's total market value. Companies are commonly grouped by market cap into large-cap, mid-cap, and small-cap, a distinction that matters because it correlates with liquidity, volatility, and how much analyst coverage a stock typically gets.</p>

      <h2 id="primary-secondary">Primary market vs secondary market</h2>
      <p>The <strong>primary market</strong> is where a company sells shares to the public for the first time — an <a href="article.html?slug=ipo">IPO</a> — receiving that money directly. The <strong>secondary market</strong> is what people usually mean by "the stock market": the day-to-day buying and selling of already-issued shares between investors, where the company itself isn't a party to the transaction and doesn't receive the proceeds.</p>

      <h2 id="bidask">Bid, ask, and the order book</h2>
      <p>At any moment, a stock has a <span class="glossary-term" data-term="Bid" data-def="The highest price a buyer is currently willing to pay for a share.">bid</span> (the highest price a buyer is currently offering) and an <span class="glossary-term" data-term="Ask" data-def="The lowest price a seller is currently willing to accept for a share.">ask</span> (the lowest price a seller is currently willing to accept). A trade executes when a buyer accepts the current ask or a seller accepts the current bid. The full list of pending buy and sell orders at every price level is the order book — covered in depth in <a href="article.html?slug=order-types">Order Types</a>.</p>

      <h2 id="circuits">Circuit limits</h2>
      <p>Indian exchanges apply circuit limits — a maximum percentage a stock is allowed to move in a single session, commonly set at 2%, 5%, 10%, or 20% depending on the stock. Hitting the upper circuit means the stock can't trade higher that day; hitting the lower circuit means it can't trade lower. Circuits exist to slow down panic-driven or manipulation-driven price spirals and give the market time to absorb new information.</p>

      <h2 id="bullbear">Bull markets and bear markets</h2>
      <p>A <strong>bull market</strong> describes a sustained period of rising prices and general optimism; a <strong>bear market</strong> describes a sustained period of falling prices and pessimism, conventionally defined as a drop of 20% or more from a recent high. These terms describe the market's overall mood over months or years, not a single day's move.</p>

      <h2 id="next">Where to go next</h2>
      <p>This closes the Foundations section. From here, <a href="article.html?slug=equity">Market Structure</a> goes deeper into equity, indices, and the exchanges themselves.</p>

  "equity": {
    lede: "Equity is one of the two basic ways a company raises money — the other being debt — and it's the asset class most people mean when they say \"the stock market.\"",
    body: `
      <h2 id="what">What equity means</h2>
      <p>Equity is ownership. When you buy a company's shares, you're buying a slice of what it owns and earns, not lending it money. There's no fixed repayment schedule and no guaranteed return — your gain or loss depends entirely on how the company performs and how the market prices that performance.</p>

      <h2 id="vs-debt">Equity vs debt capital</h2>
      <p>A company can raise money by selling equity (shares) or by taking on debt (loans or bonds). Debt must be repaid with interest regardless of how the company performs; equity carries no repayment obligation, but existing owners give up a slice of control and future profit. Most companies use a mix of both, and the balance between them — the capital structure — affects both risk and potential return for shareholders.</p>

      <h2 id="common-pref">Common shares vs preference shares</h2>
      <p><strong>Common (equity) shares</strong> carry voting rights and a residual claim on profits — dividends, if any, are paid at the company's discretion. <strong>Preference shares</strong> typically carry a fixed dividend rate and are paid out before common shareholders in the event of liquidation, but usually don't carry voting rights. Preference shares sit somewhere between equity and debt in terms of risk.</p>

      <h2 id="asset-class">Equity as an asset class</h2>
      <p>Compared to debt instruments, equity historically offers higher long-term returns paired with higher volatility and no guaranteed floor — a share's price can fall to zero if a company fails, whereas a bondholder has a legal claim on remaining assets. This risk-return trade-off is why equity is generally recommended for long time horizons, where there's room to ride out volatility.</p>
    `
  },

  "indices": {
    lede: "An index is a single number built to represent the performance of a whole basket of stocks — a shortcut for asking \"how did the market do today\" without checking hundreds of individual prices.",
    body: `
      <h2 id="what">What an index measures</h2>
      <p>Rather than tracking one company, an index tracks a defined group of stocks, combined into one number using a set methodology. When people say "the market was up 1% today," they usually mean a benchmark index like the NIFTY 50 or SENSEX moved by that amount.</p>

      <h2 id="calc">How index levels are calculated</h2>
      <p>Most modern indices, including NIFTY 50 and SENSEX, use <strong>free-float market capitalization weighting</strong>: each company's influence on the index is proportional to the market value of its shares that are actually available for public trading (excluding promoter and government holdings that aren't freely traded). A large company moving 1% shifts the index more than a small company moving 1%.</p>

      <h2 id="major">Major Indian indices</h2>
      <p><strong>NIFTY 50</strong> tracks 50 large, liquid companies listed on the <a href="article.html?slug=nse">NSE</a> across sectors, and is India's most widely used benchmark. <strong>SENSEX</strong> plays the same role for the <a href="article.html?slug=bse">BSE</a>, tracking 30 major companies. <strong>BANK NIFTY</strong> narrows the focus to the banking sector specifically, and is heavily traded in derivatives.</p>

      <h2 id="why">Why indices matter</h2>
      <p>Indices serve three practical purposes: they give traders and investors a fast read on overall market direction, they act as a performance benchmark (a fund manager who returns less than the index they're compared against has, in one sense, underperformed), and they're directly investable through index funds and ETFs that simply hold the same stocks in the same proportions.</p>
    `

  "ipo": {
    lede: "An Initial Public Offering (IPO) is the process by which a private company sells shares to the public for the first time, transitioning from privately held to listed on a stock exchange.",
    body: `
      <h2 id="what">What an IPO is</h2>
      <p>Before an IPO, a company's shares are held by founders, employees, and private investors, and can't be freely bought or sold by the public. An IPO changes that: the company issues new shares (or existing holders sell part of their stake) to public investors, and the stock begins trading on an exchange.</p>

      <h2 id="why">Why companies go public</h2>
      <p>Companies pursue IPOs primarily to raise capital for growth without taking on debt, but also to give early investors and employees a way to convert their equity into cash, to raise the company's public profile, and to create a market price that can be used for future fundraising or acquisitions.</p>

      <h2 id="process">The IPO process, briefly</h2>
      <p>A company files a <span class="glossary-term" data-term="DRHP" data-def="Draft Red Herring Prospectus — a preliminary registration document filed with SEBI containing the company's business and financial details ahead of an IPO.">Draft Red Herring Prospectus (DRHP)</span> with <a href="article.html?slug=sebi">SEBI</a>, disclosing its business, financials, and risks. A price band is announced, and the IPO opens for a few days during which investors submit bids within that band — a process called book building. Shares are then allotted (often via lottery when demand exceeds supply) before the stock lists and begins trading.</p>

      <h2 id="risks">Risks of investing in IPOs</h2>
      <p>IPOs are often surrounded by hype, and a company's opening-day price can be driven by sentiment as much as fundamentals. Newly listed stocks can be highly volatile in their first weeks, and there's limited trading history to judge how the stock behaves. Reading the prospectus and understanding the business — rather than buying purely because "everyone's applying" — is the difference between participating and speculating.</p>
    `
  },

  "fpo": {
    lede: "A Follow-on Public Offering (FPO) is how an already-listed company raises additional capital by issuing more shares to the public — the sequel to an IPO, not the debut.",
    body: `
      <h2 id="what">What an FPO is</h2>
      <p>Once a company is listed, it can return to the public market to raise more money through an FPO. Unlike an IPO, the company already has a trading history, a known share price, and public financial disclosures — which generally makes an FPO easier for investors to evaluate.</p>

      <h2 id="vs-ipo">FPO vs IPO</h2>
      <p>The core difference is simple: an IPO takes a company from private to public for the first time; an FPO is a public company issuing more shares. FPOs are usually priced at a discount to the current market price, to make the new shares attractive despite the company already being known and traded.</p>

      <h2 id="why">Why companies raise via FPO</h2>
      <p>Common reasons include funding expansion, paying down debt, or improving the company's capital position. Regulators or lenders sometimes also require companies to reduce debt levels, which an FPO can help achieve without taking on more borrowing.</p>

      <h2 id="types">Dilutive vs non-dilutive FPOs</h2>
      <p>A <strong>dilutive FPO</strong> issues entirely new shares, increasing the total share count and reducing (diluting) each existing shareholder's percentage ownership. A <strong>non-dilutive FPO</strong> involves large existing shareholders — such as founders or early investors — selling part of their own holdings to the public, which doesn't change the total number of shares outstanding.</p>
    `
  },

      <p>Individuals trading their own money, typically through a broker's app or platform. Retail participants have grown into a significant share of daily trading volume in India, particularly in derivatives, though they generally trade in smaller sizes than institutions.</p>

      <h2 id="institutional">Institutional investors</h2>
      <p>Large organizations trading substantial capital on behalf of others. <strong>Foreign Institutional Investors (FIIs)</strong> are overseas entities investing in Indian markets; <strong>Domestic Institutional Investors (DIIs)</strong> — mutual funds, insurance companies, pension funds based in India — do the same domestically. Their buying and selling activity, published daily, is closely watched as a sentiment indicator, since their size can noticeably move prices.</p>

      <h2 id="marketmakers">Brokers and market makers</h2>
      <p>Brokers are the intermediaries that give retail participants and institutions access to the exchange, executing orders on their behalf. Market makers go a step further, continuously quoting both a buy and sell price for a security to ensure there's always someone on the other side of a trade — providing the liquidity that keeps markets functioning smoothly, especially in less-traded stocks.</p>

      <h2 id="regulators">Regulators</h2>
      <p><a href="article.html?slug=sebi">SEBI</a> sets and enforces the rules every other participant operates under — from how exchanges function to what companies must disclose to shareholders. Regulators don't trade; their role is to keep the system fair enough that everyone else is willing to keep participating in it.</p>
    `

      <h2 id="history">A brief history</h2>
      <p>SEBI was established in 1988 as a non-statutory body and given statutory powers in 1992 through the SEBI Act, in direct response to the need for stronger market oversight following irregularities in the Indian stock market at the time. It replaced a fragmented, less effective regulatory structure with a single dedicated authority.</p>

      <h2 id="role">What SEBI does</h2>
      <p>SEBI's role spans three broad areas: <strong>protecting investors</strong> from fraud and unfair practices, <strong>regulating market participants</strong> — exchanges, brokers, mutual funds, listed companies, and more — through registration and conduct rules, and <strong>developing the market</strong> by introducing reforms like dematerialization, tightened IPO disclosure norms, and rules governing algorithmic and high-frequency trading.</p>

  "brokers": {

    body: `
      <h2 id="does">What a broker does</h2>
      <p>Exchanges only accept orders from registered members, so individual traders and investors access the market through a broker, who routes the order to the exchange, handles execution, and maintains the accounts that hold your funds and holdings.</p>

      <h2 id="types">Full-service vs discount brokers</h2>
      <p><strong>Full-service brokers</strong> pair trade execution with research, advisory calls, and relationship-manager support, generally at a higher cost. <strong>Discount brokers</strong> strip this down to a low-cost, largely self-service trading platform — research and advice aren't part of the offering, but the cost per trade is significantly lower. The rise of discount brokers has been a major factor behind the growth in Indian retail participation over the last decade.</p>

      <h2 id="charges">Brokerage and other charges</h2>
      <p>Trading isn't free even beyond the price of the asset itself. Costs typically include brokerage (a fee per trade, often a flat amount or a small percentage), <span class="glossary-term" data-term="STT" data-def="Securities Transaction Tax — a tax levied by the government on every exchange trade, deducted automatically.">Securities Transaction Tax (STT)</span>, exchange transaction charges, GST, SEBI charges, and stamp duty. These are small individually but add up for frequent traders — worth checking before choosing a broker or a trading style.</p>

      <h2 id="choosing">Choosing a broker</h2>

  "demat-account": {
    lede: "A demat account holds your shares electronically — the modern replacement for paper share certificates, without which you can't hold Indian securities at all.",
    body: `
      <h2 id="demat">What dematerialization means</h2>
      <p>"Demat" is short for dematerialization: converting physical share certificates into an electronic record. Before this became mandatory in India, owning shares meant physically holding paper certificates, which carried real risks of loss, theft, and forgery, and made settlement slow.</p>

      <h2 id="holds">What a demat account holds</h2>
      <p>Once you buy shares, they're credited to your demat account electronically, and they leave it the moment you sell. A demat account can hold shares, bonds, ETFs, mutual fund units, and government securities — essentially anything that exists as a dematerialized security.</p>

      <h2 id="depositories">Depositories: NSDL and CDSL</h2>
      <p>Demat accounts aren't held directly with a broker — they're held with a depository, and the broker (acting as a Depository Participant) provides access to it. India has two depositories: <strong>NSDL</strong> (National Securities Depository Limited) and <strong>CDSL</strong> (Central Depository Services Limited). Which one your account sits with usually depends on which broker you use.</p>

      <h2 id="vs-trading">Demat account vs trading account</h2>
      <p>A demat account stores what you own; it doesn't place orders. That's the job of the <a href="article.html?slug=trading-account">trading account</a>, which works alongside it — the next entry covers how the two connect.</p>
    `

      <h2 id="together">How the three work together</h2>

      <h2 id="3in1">3-in-1 accounts</h2>

  "order-types": {
    lede: "The way you place an order — not just what you buy and at what price — determines how, when, and even whether that order actually executes.",
    body: `
      <h2 id="why">Why order type matters</h2>
      <p>Two traders can have the identical view on a stock and still get very different outcomes purely based on the order type they used — one might get filled instantly at a worse price, another might wait for a better price and miss the move entirely. Order types are the tools that let you control that trade-off deliberately instead of leaving it to chance.</p>

      <h2 id="overview">The order types covered in this section</h2>
      <p><strong><a href="article.html?slug=market-orders">Market orders</a></strong> execute immediately at the best available price. <strong><a href="article.html?slug=limit-orders">Limit orders</a></strong> execute only at a price you specify or better. <strong><a href="article.html?slug=stop-loss">Stop-loss orders</a></strong> trigger a market or limit order once a price is touched, typically to cap a loss. <strong><a href="article.html?slug=stop-limit">Stop-limit orders</a></strong> combine a trigger price with a limit price for more control. <strong><a href="article.html?slug=gtt-orders">GTT orders</a></strong> stay active until triggered, without needing to be re-placed daily.</p>
      <p>Separately, <strong><a href="article.html?slug=mis">MIS</a></strong> and <strong><a href="article.html?slug=cnc">CNC</a></strong> aren't order types in the same sense — they're product types that determine whether a position is squared off the same day or held for delivery, covered at the end of this section.</p>
    `

  "market-orders": {
    lede: "A market order says: buy or sell this right now, at whatever the best available price happens to be.",
    body: `
      <h2 id="what">What it is</h2>
      <p>A market order doesn't specify a price — it instructs the broker to execute immediately against the best price currently available in the order book. In a liquid stock, this happens almost instantly and close to the price you last saw quoted.</p>

      <h2 id="tradeoff">Speed vs price certainty</h2>
      <p>The trade-off is straightforward: a market order guarantees execution (assuming there's someone on the other side) but not price. In a fast-moving or illiquid stock, the price you actually get — called <span class="glossary-term" data-term="Slippage" data-def="The difference between the price you expected on an order and the price you actually got.">slippage</span> — can differ meaningfully from the price you saw a moment before placing the order.</p>

      <h2 id="when">When to use it</h2>
      <p>Market orders suit situations where getting in or out matters more than the exact price — exiting a losing position quickly, or entering a highly liquid, large-cap stock where price impact is minimal. They're used less often in illiquid stocks or during high volatility, where a limit order gives more control.</p>
    `

  "limit-orders": {
    lede: "A limit order says: buy or sell this, but only at this price or better — trading certainty of price for certainty of execution.",
    body: `
      <h2 id="what">What it is</h2>
      <p>With a buy limit order, you specify the maximum price you're willing to pay; the order only executes at that price or lower. With a sell limit order, you specify the minimum price you're willing to accept; it only executes at that price or higher.</p>

      <h2 id="tradeoff">Price certainty vs execution risk</h2>
      <p>The trade-off mirrors the market order's, in reverse: you know the worst price you can get, but there's no guarantee the order fills at all — if the market never reaches your limit price, the order simply sits unfilled until you cancel it or it expires.</p>

      <h2 id="example">A simple example</h2>
      <p>A stock is trading at ₹500. You place a buy limit order at ₹495, expecting a small dip. If the price drops to ₹495 or below, your order fills; if it instead rises straight to ₹520, your order never triggers and you miss the move entirely.</p>
    `

  "stop-loss": {
    lede: "A stop-loss order is a standing instruction to exit a position automatically once the price moves against you by a defined amount — the single most important tool for controlling risk on any individual trade.",
    body: `
      <h2 id="what">What it is and why it exists</h2>
      <p>A stop-loss doesn't execute immediately like a market or limit order — it sits inactive until the market reaches a "trigger price" you set, at which point it activates and places an exit order. Its entire purpose is to cap the loss on a position without requiring you to watch the screen constantly.</p>

      <h2 id="how">How it works</h2>
      <p>Say you buy a stock at ₹500 and set a stop-loss trigger at ₹480. If the price falls to ₹480, the stop-loss activates and places an order to sell — protecting you from a deeper decline if the stock keeps falling, at the cost of exiting a position that might have recovered.</p>

      <h2 id="slm-sll">Stop-loss market vs stop-loss limit</h2>
      <p>Once triggered, a stop-loss can place either a market order (executes immediately at the best available price, prioritizing certainty of exit) or a limit order (executes only at your specified price or better, prioritizing price control) — the latter is covered in detail in <a href="article.html?slug=stop-limit">Stop Limit</a>.</p>

      <h2 id="mistakes">Common mistakes</h2>
      <p>Setting a stop-loss too tight means normal price noise triggers an exit before the trade has room to work; setting it too wide defeats its purpose of limiting loss. A stop-loss level should generally be based on where your original reason for the trade is proven wrong — a chart level, not an arbitrary percentage.</p>
    `
  },

  "stop-limit": {
    lede: "A stop-limit order adds a second price to a stop-loss: instead of exiting at whatever price is available once triggered, it only exits at your specified limit price or better.",
    body: `
      <h2 id="what">What it is</h2>
      <p>A stop-limit order requires two prices: a trigger price (which activates the order, same as a plain stop-loss) and a limit price (the worst price you're willing to accept once it activates). This gives you control over execution price that a standard stop-loss market order doesn't.</p>

      <h2 id="risk">The risk: it might not execute at all</h2>
      <p>That added control comes at a cost. If the price gaps sharply past your limit price — common during high volatility or overnight news — the order can remain unfilled while the price keeps moving away, leaving you holding a losing position with no exit. This is the opposite failure mode of a plain stop-loss, which guarantees an exit but not the price.</p>

      <h2 id="when">When to use it</h2>
      <p>Stop-limit orders suit situations where a large, sudden price gap through your stop level is unlikely, and where getting a specific price matters more than guaranteed execution — for example, in a highly liquid stock during normal trading hours, rather than around a major, unpredictable news event.</p>
    `

  "gtt-orders": {
    lede: "A GTT (Good Till Triggered) order stays active until its trigger condition is met or you cancel it, without needing to be placed fresh every single trading day.",
    body: `
      <h2 id="what">What GTT means</h2>
      <p>Regular orders in India typically expire at the end of the trading day if unfilled. A GTT order removes that daily reset — you set a trigger condition once, and the order remains live across multiple sessions until it's triggered, cancelled, or reaches the broker's maximum validity period.</p>

      <h2 id="difference">How it differs from a regular order</h2>
      <p>The mechanics of execution are similar to a stop-loss or limit order once triggered — the difference is purely about how long the order stays "armed" while waiting for its condition to be met, saving you from manually re-entering the same order morning after morning.</p>

      <h2 id="usecases">Use cases</h2>
      <p>GTT orders are useful for setting a long-term target exit on an investment you don't check daily, or for placing a stop-loss on a position you're holding for weeks without wanting to monitor it constantly. They're less relevant for intraday trading, where positions don't carry overnight anyway.</p>
    `

  "mis": {
    lede: "MIS (Margin Intraday Square-off) is a product type for intraday trading that offers additional buying power, on the condition that the position is closed the same day.",
    body: `
      <h2 id="what">What MIS means</h2>
      <p>Selecting MIS when placing an order tells the broker you intend to close the position within the same trading day, in exchange for which the broker extends additional margin (leverage) — letting you take a larger position than your available cash would otherwise allow.</p>

      <h2 id="leverage">The leverage trade-off</h2>
      <p>Leverage magnifies both gains and losses proportionally, since you're controlling a larger position with the same capital. It doesn't change the underlying risk of the trade being right or wrong — it changes how much that right-or-wrong outcome affects your account.</p>

      <h2 id="autosquareoff">Auto square-off risk</h2>
      <p>If an MIS position isn't manually closed before the broker's cutoff time, it's automatically squared off — closed at the prevailing market price, regardless of whether that's favorable. This is a real risk during highly volatile closing sessions, and worth understanding before relying on MIS regularly.</p>
    `

  "cnc": {
    lede: "CNC (Cash and Carry) is the product type used when you intend to actually hold shares beyond the trading day — the default choice for investing rather than intraday trading.",
    body: `
      <h2 id="what">What CNC means</h2>
      <p>Selecting CNC means you're paying the full value of the shares upfront (no leverage) and taking delivery into your demat account, with no obligation to sell by any particular time. The position simply stays in your holdings until you choose to sell.</p>

      <h2 id="vs-mis">CNC vs MIS</h2>
      <p>The two are close to opposites: MIS offers leverage but forces same-day closure and carries auto square-off risk; CNC offers no leverage but no time pressure at all. Neither is "better" in the abstract — the right choice depends entirely on whether your intention is a same-day trade or a multi-day-or-longer hold.</p>

      <h2 id="when">When to use CNC</h2>
      <p>Use CNC any time you plan to hold a position overnight or longer — for swing trades, positional trades, or long-term investments. Using MIS by mistake for a position you meant to hold can trigger an unwanted auto square-off; using CNC for a genuine same-day trade simply means you didn't get the extra leverage MIS would have offered.</p>

      <h2 id="next">Where to go next</h2>
      <p>With accounts and orders covered, <a href="article.html?slug=intraday-trading">Trading Styles</a> looks at how holding period shapes an entire approach to the market — starting with intraday trading.</p>
    `
