  "intraday-trading": {
    lede: "Intraday trading means opening and closing every position within the same trading day — no position is ever carried home overnight.",
    body: `
      <h2 id="what">What it is</h2>
      <p>Every intraday trade begins and ends between market open and close on the same day. This is typically done using the <a href="article.html?slug=mis">MIS</a> product type, which offers additional leverage in exchange for the requirement that positions are squared off before the day ends.</p>

      <h2 id="how">How a typical intraday trade works</h2>
      <p>An intraday trader usually watches short timeframe charts (5-minute to hourly), looks for setups based on price action or indicators, enters with a defined stop-loss, and targets a move that plays out within hours rather than days. Multiple trades in a single day are common.</p>

      <h2 id="commitment">Time commitment and tools needed</h2>
      <p>This is the most time-intensive trading style — it demands active screen time for most or all of the trading session, a reliable low-latency broker platform, and the ability to make quick decisions under pressure. It isn't well suited to someone who can only check the market occasionally during the day.</p>

      <h2 id="proscons">Pros and cons</h2>
      <p>The upside: no overnight risk from news or gaps, faster feedback on whether your approach is working, and the leverage MIS provides. The downside: higher stress, more transaction costs from frequent trading, and a genuinely steep learning curve — most beginners underestimate how much screen discipline it requires.</p>

      <h2 id="suits">Who it suits</h2>
      <p>Intraday trading suits people who can dedicate consistent, focused time during market hours, who handle fast decisions well, and who have already built comfort with <a href="article.html?slug=risk-management">risk management</a> and reading a chart in real time — it's rarely a good starting point for a complete beginner.</p>
    `
  },

  "swing-trading": {
    lede: "Swing trading holds positions for a few days to a few weeks, aiming to capture a single meaningful price move without needing to watch the screen all day.",
    body: `
      <h2 id="what">What it is</h2>
      <p>Rather than closing a trade the same day, a swing trader holds through the ups and downs of a short-term trend, aiming to exit once that move has largely played out — typically using <a href="article.html?slug=cnc">CNC</a> since positions are carried overnight.</p>

      <h2 id="timeframe">Holding period and timeframes</h2>
      <p>Swing trades commonly last anywhere from a few days to a few weeks. Analysis usually happens on daily or 4-hour charts, which filter out a lot of the noise visible on shorter intraday timeframes and give trends more room to develop before a decision is needed.</p>

      <h2 id="proscons">Pros and cons</h2>
      <p>Swing trading requires far less daily screen time than intraday trading, since positions don't need constant monitoring — a check once or twice a day is often enough. The trade-off is overnight and weekend risk: news or gaps that occur while markets are closed can move a position sharply before you get a chance to react.</p>

      <h2 id="suits">Who it suits</h2>
      <p>This style tends to suit people with a full-time job or other commitments who can't watch charts all day, but who still want to be more actively involved than a long-term investor — checking in once daily rather than continuously.</p>
    `
  },

  "scalping": {
    lede: "Scalping is the shortest-timeframe trading style — holding positions for seconds to a few minutes, aiming to collect very small, frequent profits that add up over many trades.",
    body: `
      <h2 id="what">What it is</h2>
      <p>A scalper might take dozens of trades in a single session, each targeting a very small price move — often just a handful of points or ticks — and exiting the instant that target is hit or the trade shows signs of going wrong.</p>

      <h2 id="how">How scalpers operate</h2>
      <p>Because individual profit targets are small, scalping relies on high win consistency and tight risk control rather than any single big win. It's typically done on the shortest chart timeframes (1-minute or tick charts) in highly liquid instruments, where entering and exiting quickly doesn't itself move the price.</p>

      <h2 id="requirements">What it requires</h2>
      <p>Scalping demands a low-latency, reliable broker connection, low transaction costs (since costs are paid on a very high number of trades), and an unusual degree of sustained focus and quick decision-making. Brokerage and other charges, covered in <a href="article.html?slug=brokers">Brokers</a>, matter more here than in any other trading style, since they're paid far more frequently.</p>

      <h2 id="risks">Risks</h2>
      <p>Because each trade's profit margin is thin, a handful of slower executions, wider-than-expected spreads, or a bit of bad luck can erase an entire session's gains quickly. Scalping is widely considered one of the most demanding trading styles precisely because there's so little room for error on any individual trade.</p>
    `
  },

  "positional-trading": {
    lede: "Positional trading holds a position for weeks to months, sitting between swing trading and long-term investing — long enough to ride a bigger trend, short enough to still require an active view.",
    body: `
      <h2 id="what">What it is</h2>
      <p>A positional trader isn't trying to catch every wiggle in price the way an intraday or swing trader might — they identify a larger trend and stay in the position through its normal short-term fluctuations, exiting only once the broader thesis plays out or breaks down.</p>

      <h2 id="blend">A blend of technical and fundamental analysis</h2>
      <p>Positional trading often draws on both disciplines: <a href="article.html?slug=technical-analysis">technical analysis</a> to time entries and identify the trend, and <a href="article.html?slug=fundamental-analysis">fundamental analysis</a> to build conviction that the trend has a real underlying reason to continue — a sector tailwind, an earnings growth story, or a structural shift in a business.</p>

      <h2 id="proscons">Pros and cons</h2>
      <p>Positional trading demands far less daily attention than swing or intraday trading, and gives a trend more room to develop without being shaken out by short-term noise. The cost is capital being tied up for longer, and larger potential drawdowns if the broader trend does eventually reverse against the position.</p>
    `
  },

  "long-term-investing": {
    lede: "Long-term investing holds an asset for years, sometimes decades, betting on the underlying growth of a business or economy rather than on short-term price movement.",
    body: `
      <h2 id="what">What it is</h2>
      <p>A long-term investor buys with the expectation that a company's value — and by extension its share price — will be meaningfully higher years from now, largely disregarding the day-to-day and even month-to-month price swings along the way.</p>

      <h2 id="approach">The approach: fundamentals and compounding</h2>
      <p>This style relies almost entirely on <a href="article.html?slug=fundamental-analysis">fundamental analysis</a> — evaluating a business's financial health, competitive position, and growth prospects — combined with the power of <a href="article.html?slug=compounding">compounding</a>, where returns generated over early years continue growing on top of themselves in later years.</p>

      <h2 id="proscons">Pros and cons</h2>
      <p>Long-term investing requires the least active time commitment of any approach in this section — periodic review rather than daily attention — and historically has offered strong risk-adjusted returns for patient investors in fundamentally sound assets. The trade-off is opportunity cost (capital is tied up for years) and the emotional difficulty of holding through significant drawdowns without reacting.</p>

      <h2 id="next">Where to go next</h2>
      <p>This closes Trading Styles. <a href="article.html?slug=technical-analysis">Technical Analysis</a> comes next — the largest section in the Codex, covering everything from candlesticks to Elliott Wave.</p>
    `
  },

  "technical-analysis": {
    lede: "Technical analysis is the study of price and volume history to make decisions about what a market might do next — reading the chart itself, rather than the business behind it.",
    body: `
      <h2 id="what">What technical analysis is</h2>
      <p>Where <a href="article.html?slug=fundamental-analysis">fundamental analysis</a> asks "is this a good business," technical analysis asks "what is the price actually doing, and what has it tended to do after similar behavior in the past." It works entirely from charts — price, volume, and derived indicators.</p>

      <h2 id="assumption">The core assumptions</h2>
      <p>Technical analysis rests on three ideas: that price already reflects all available information (including things not yet publicly known but suspected by informed participants), that prices move in trends rather than randomly, and that patterns of behavior tend to repeat because they're driven by human psychology, which doesn't fundamentally change.</p>

      <h2 id="limits">What it can and can't tell you</h2>
      <p>Technical analysis is genuinely useful for timing, for defining risk with clear invalidation levels, and for reading the market's current balance of buyers and sellers. It's not a crystal ball — it describes probabilities based on historical patterns, not certainties, and it says very little about whether a company itself is fundamentally sound.</p>

      <h2 id="building-blocks">What this section covers</h2>
      <p>The entries ahead move from the basics — reading a single candle, drawing a trendline — through indicators like RSI and MACD, up to more involved frameworks like Dow Theory and Elliott Wave.</p>
    `
  },

  "fundamental-analysis": {
    lede: "Fundamental analysis evaluates a company's actual business — its financial health, competitive position, and growth prospects — to judge whether its shares are fairly priced.",
    body: `
      <h2 id="what">What fundamental analysis is</h2>
      <p>Rather than reading a chart, a fundamental analyst reads financial statements: revenue and profit trends, debt levels, cash flow, margins, and how these compare to competitors. The goal is estimating what a company is actually worth, and comparing that to its current market price.</p>

      <h2 id="looks-at">What analysts look at</h2>
      <p>Common areas of focus include revenue and earnings growth, profitability ratios, debt relative to equity, cash flow generation, and valuation ratios like price-to-earnings, which compare a stock's price to its profits. Beyond the numbers, qualitative factors — management quality, competitive moat, industry outlook — matter just as much.</p>

      <h2 id="topdown">Top-down vs bottom-up</h2>
      <p>A <strong>top-down</strong> approach starts broad — the economy, then a sector, then a company — narrowing down to a specific stock. A <strong>bottom-up</strong> approach starts with an individual company's merits and works outward, treating the broader economic picture as secondary.</p>

      <h2 id="vs-ta">When each matters more</h2>
      <p>Fundamental analysis tends to matter more for longer holding periods, where a company's actual performance has time to be reflected in its price. Technical analysis tends to matter more for shorter holding periods, where near-term price behavior dominates. Most experienced investors use both in different proportions.</p>
    `
  },

  "candlestick-charts": {
    lede: "A candlestick packs four pieces of price information — open, high, low, and close — into a single visual shape, making it the standard way traders read price action.",
    body: `
      <h2 id="anatomy">Anatomy of a candle</h2>
      <p>Each candle has a "body," spanning the open and close price for that period, and "wicks" (or shadows) extending to the high and low. A wide body shows strong directional movement; long wicks show rejection — price traveled there but didn't stay.</p>

      <h2 id="bullbear">Bullish vs bearish candles</h2>
      <p>A candle where the close is higher than the open is typically colored green (or white) and called bullish; a candle where the close is lower than the open is typically colored red (or black) and called bearish. This color coding is what makes candlestick charts fast to scan at a glance.</p>

      <h2 id="why">Why candles beat a line chart</h2>
      <p>A line chart, usually drawn from closing prices only, hides everything that happened within a period. A candlestick shows the full range and where price settled within it — information that's the entire basis for <a href="article.html?slug=candlestick-patterns">candlestick pattern</a> analysis covered later in the Codex.</p>
    `
  },

  "ohlc": {
    lede: "OHLC — Open, High, Low, Close — is the four numbers that describe price behavior over any given period, and the raw data behind every candlestick and bar chart.",
    body: `
      <h2 id="what">What OHLC stands for</h2>
      <p><strong>Open</strong> is the first traded price in the period; <strong>High</strong> and <strong>Low</strong> are the highest and lowest traded prices; <strong>Close</strong> is the last traded price. A "period" can be a minute, an hour, a day, or any other <a href="article.html?slug=timeframes">timeframe</a>.</p>

      <h2 id="candle">How OHLC builds a candle</h2>
      <p>A candlestick is simply a visual representation of these four numbers: the body spans open to close, and the wicks extend to the high and low. Every candle on a chart, regardless of timeframe, is drawn from its own OHLC data set.</p>

      <h2 id="vsline">OHLC vs line chart data</h2>
      <p>A line chart typically plots only the closing price of each period, connected point to point. OHLC-based charts (bars or candles) retain the full range of movement within each period — more information, at the cost of being visually denser.</p>
    `
  },

  "chart-types": {
    lede: "The same price data can be displayed several different ways — each chart type trading off detail, clarity, and noise reduction differently.",
    body: `
      <h2 id="line">Line charts</h2>
      <p>The simplest chart type, plotting closing prices connected by a line. Line charts are easy to read at a glance and good for spotting the big picture, but they hide intraperiod volatility entirely.</p>

      <h2 id="bar">Bar (OHLC) charts</h2>
      <p>Bar charts show the full <a href="article.html?slug=ohlc">OHLC</a> range using vertical lines with small tick marks for open and close, rather than a solid body. They carry the same information as a candlestick chart in a less visually immediate format.</p>

      <h2 id="candle">Candlestick charts</h2>
      <p>The most widely used chart type among traders, covered in detail in <a href="article.html?slug=candlestick-charts">Candlestick Charts</a> — the same OHLC data as a bar chart, but with color-coded bodies that make bullish and bearish periods easy to distinguish quickly.</p>

      <h2 id="heikinashi">Heikin-Ashi</h2>
      <p>A modified candlestick chart that averages price data across periods to smooth out noise and make trends more visually obvious. It's useful for spotting the broader trend, but because it averages data, its individual candles no longer show the exact traded open, high, low, or close.</p>
    `
  },

  "timeframes": {
    lede: "A timeframe determines how much price action is compressed into a single candle — from one minute to an entire month — and it fundamentally changes what a chart appears to show.",
    body: `
      <h2 id="what">What a timeframe is</h2>
      <p>A 5-minute chart draws a new candle every five minutes; a daily chart draws one candle per trading day. The same underlying price data looks completely different depending on which timeframe you're viewing it on — a sharp, volatile move on a 1-minute chart can look like an unremarkable blip on a weekly chart.</p>

      <h2 id="common">Common timeframes</h2>
      <p>Intraday traders commonly use 1-minute to 15-minute charts; swing traders lean toward hourly to daily charts; positional traders and investors often work primarily off daily, weekly, or monthly charts. The right timeframe generally matches your intended <a href="article.html?slug=intraday-trading">trading style</a> and holding period.</p>

      <h2 id="multi">Multi-timeframe analysis</h2>
      <p>Many traders check more than one timeframe before entering a trade — for example, using a daily chart to establish the broader trend, then a 15-minute chart to time a precise entry within that trend. This helps avoid taking a short-term signal that runs directly against the larger trend.</p>
    `
  },

  "support": {
    lede: "Support is a price level where a stock has historically found buying interest strong enough to stop or reverse a decline — a floor, of sorts, though not a guaranteed one.",
    body: `
      <h2 id="what">What support is</h2>
      <p>When a stock falls to a certain price and buyers repeatedly step in, pushing it back up, that price level is identified as support. It's not a hard rule or a law of physics — it's a pattern of past behavior that traders use to estimate where buying pressure might reappear.</p>

      <h2 id="why">Why it forms</h2>
      <p>Support often forms at prices with psychological significance (round numbers), at levels where a large volume of past buying occurred, or simply where enough traders have independently drawn the same conclusion that it becomes somewhat self-fulfilling — enough people expecting support there actually creates buying at that level.</p>

      <h2 id="use">How traders use it</h2>
      <p>Traders often look to buy near support with a stop-loss placed just below it — reasoning that if the level truly breaks, the original thesis for the trade is wrong. Support levels also inform where <a href="article.html?slug=stop-loss">stop-loss</a> orders are commonly placed.</p>
    `
  },

  "resistance": {
    lede: "Resistance is the mirror image of support — a price level where selling pressure has historically been strong enough to stop or reverse a rally.",
    body: `
      <h2 id="what">What resistance is</h2>
      <p>When a stock rallies to a certain price and sellers repeatedly emerge, pushing it back down, that price level is identified as resistance. Like support, it's a pattern-based observation rather than a guarantee.</p>

      <h2 id="why">Why it forms</h2>
      <p>Resistance commonly forms at prior swing highs, round numbers, or levels where traders who bought earlier and are now sitting on a small loss decide to exit as soon as they "get back to even" — creating a wave of selling right around their original entry price.</p>

      <h2 id="flip">Support becoming resistance, and vice versa</h2>
      <p>A broken support level often becomes resistance afterward, and a broken resistance level often becomes support — because the psychology of the traders watching that price level flips once it's decisively broken. This role-reversal is one of the more reliable patterns in <a href="article.html?slug=price-action">price action</a> analysis.</p>
    `
  },

  "trendlines": {
    lede: "A trendline is a straight line connecting a series of highs or lows, used to visualize the direction and steepness of a trend.",
    body: `
      <h2 id="what">Drawing a trendline</h2>
      <p>An <strong>uptrend line</strong> connects a series of rising lows, sitting below price and acting as a rough support level. A <strong>downtrend line</strong> connects a series of falling highs, sitting above price and acting as a rough resistance level. At least two touch points are needed to draw one; a third touch that respects the line adds confidence that it's meaningful.</p>

      <h2 id="use">How traders use trendlines</h2>
      <p>Trendlines help visualize whether a trend is intact, accelerating, or losing momentum (a flattening trendline often signals weakening momentum). A decisive break of a trendline is often treated as an early signal that the trend may be reversing or pausing.</p>

      <h2 id="limits">Limitations</h2>
      <p>Trendlines are somewhat subjective — two traders looking at the same chart can draw meaningfully different lines depending on which highs or lows they choose to connect. They work best as one input alongside other tools, not as a standalone signal.</p>
    `
  },

  "channels": {
    lede: "A channel is formed by two parallel trendlines — one connecting highs, one connecting lows — containing price action within a defined range as it trends.",
    body: `
      <h2 id="what">What a channel is</h2>
      <p>When price respects both an upper and lower trendline moving in the same general direction, it's said to be trading in a channel. An ascending channel trends upward between two rising parallel lines; a descending channel trends downward between two falling parallel lines.</p>

      <h2 id="trading">Trading within a channel</h2>
      <p>Some traders buy near the lower boundary of an ascending channel and sell near the upper boundary, treating the channel lines similarly to dynamic <a href="article.html?slug=support">support</a> and <a href="article.html?slug=resistance">resistance</a> — repeating this as price oscillates between the two lines.</p>

      <h2 id="breakout">Breaking out of a channel</h2>
      <p>A decisive move outside either boundary often signals the trend is accelerating (a break above the upper line of an ascending channel) or reversing (a break below the lower line) — covered further in <a href="article.html?slug=breakout-trading">Breakout Trading</a>.</p>
    `
  },

  "moving-averages": {
    lede: "A moving average smooths out price by averaging it over a set number of periods, making the underlying trend easier to see through the day-to-day noise.",
    body: `
      <h2 id="what">What a moving average is</h2>
      <p>Rather than looking at raw, jumpy price data, a moving average plots the average price over the last N periods, updating as each new period closes. It moves more slowly than price itself, which is exactly what makes it useful for identifying the underlying trend.</p>

      <h2 id="use">How it's used</h2>
      <p>Price trading above a moving average is often read as a sign of an uptrend; below, a downtrend. Moving averages are also commonly used as dynamic support or resistance, since price frequently reacts around them the same way it does around static support and resistance levels.</p>

      <h2 id="types">SMA vs EMA</h2>
      <p>There are different ways to calculate a moving average. The two most common are the <a href="article.html?slug=sma">Simple Moving Average (SMA)</a>, which weights every period equally, and the <a href="article.html?slug=ema">Exponential Moving Average (EMA)</a>, which weights recent periods more heavily — each covered in its own entry next.</p>
    `
  },

  "ema": {
    lede: "The Exponential Moving Average (EMA) is a moving average that weights recent prices more heavily than older ones, making it react faster to new price movement than a Simple Moving Average.",
    body: `
      <h2 id="what">What makes it different</h2>
      <p>A <a href="article.html?slug=sma">Simple Moving Average</a> treats every period in its lookback equally. An EMA applies a mathematical weighting that gives more importance to recent prices, so it turns and follows price changes more quickly.</p>

      <h2 id="responsiveness">Responsiveness trade-off</h2>
      <p>That faster response is a double-edged sword: an EMA reacts to a new trend sooner than an SMA, but it's also more prone to whipsawing — giving false signals — during choppy, sideways price action where there's no clear trend to follow.</p>

      <h2 id="common">Common periods used</h2>
      <p>Shorter EMAs (like a 9 or 21 period) are commonly used to gauge near-term momentum; longer EMAs (like a 50 or 200 period) are commonly used to gauge the broader trend. Crossovers between a short and long EMA are a widely used, simple trend-following signal.</p>
    `
  },

  "sma": {
    lede: "The Simple Moving Average (SMA) is the most basic moving average — the plain arithmetic average of a stock's price over a set number of periods.",
    body: `
      <h2 id="what">What SMA is</h2>
      <p>A 50-day SMA, for example, is simply the average closing price of the last 50 trading days, recalculated fresh as each new day closes and the oldest day drops out of the calculation. Every day in that window carries equal weight.</p>

      <h2 id="vs-ema">SMA vs EMA</h2>
      <p>Because it weights all periods equally, an SMA is smoother and slower to react than an <a href="article.html?slug=ema">EMA</a> — which can be an advantage (fewer false signals in choppy markets) or a disadvantage (slower to catch new trends), depending on what a trader is trying to achieve.</p>

      <h2 id="uses">Common uses</h2>
      <p>The 200-day SMA is one of the most widely watched levels in markets, often treated as a rough dividing line between a long-term uptrend (price above it) and downtrend (price below it) by a large share of market participants — which itself adds to its significance, since so many people are watching the same level.</p>
    `
  },

  "vwap": {
    lede: "VWAP (Volume Weighted Average Price) shows the average price a stock has traded at during the day, weighted by how much volume traded at each price — a benchmark for whether a given price is relatively cheap or expensive intraday.",
    body: `
      <h2 id="what">What VWAP is</h2>
      <p>Unlike a simple moving average, VWAP gives more weight to prices where more volume traded, rather than treating every price tick equally. It resets at the start of each trading session and builds throughout the day.</p>

      <h2 id="use">How intraday traders use it</h2>
      <p>Price trading above VWAP is often read as a sign of intraday strength (buyers are, on average, in profit); below VWAP suggests intraday weakness. Some intraday traders use it as a dynamic support/resistance level, similar to a moving average but specific to the current session.</p>

      <h2 id="institutional">An institutional benchmark</h2>
      <p>VWAP is also widely used by institutional traders to judge their own execution quality — a large fund buying below VWAP for the day, for instance, has arguably executed well relative to the average participant. This makes VWAP a level that's genuinely watched by large players, not just retail traders.</p>
    `
  },

  "rsi": {
    lede: "RSI (Relative Strength Index) measures the speed and magnitude of recent price changes on a 0–100 scale, used to judge whether a stock has moved too far, too fast in either direction.",
    body: `
      <h2 id="what">What RSI measures</h2>
      <p>RSI compares the average size of recent up-moves to the average size of recent down-moves over a set lookback period (commonly 14), producing a single number between 0 and 100 that reflects momentum rather than raw price.</p>

      <h2 id="levels">Overbought and oversold levels</h2>
      <p>By convention, RSI above 70 is often labeled "overbought" (suggesting the recent rally has been unusually strong and could be due for a pause or pullback), and below 30 "oversold" (the reverse). These are guidelines based on historical tendency, not hard rules — a strong trend can keep RSI extended for long stretches.</p>

      <h2 id="divergence">Divergence</h2>
      <p>When price makes a new high but RSI fails to make a correspondingly higher high, that's called bearish divergence — a sign that underlying momentum is weakening even as price keeps climbing, often watched as an early warning sign of a potential reversal. The reverse pattern is bullish divergence.</p>

      <h2 id="limits">Limitations</h2>
      <p>RSI can stay overbought or oversold for extended periods during a strong trend, so treating those thresholds as automatic buy or sell signals — without considering the broader trend — is a common beginner mistake.</p>
    `
  },

  "macd": {
    lede: "MACD (Moving Average Convergence Divergence) tracks the relationship between two EMAs to gauge both trend direction and momentum in a single indicator.",
    body: `
      <h2 id="what">What MACD is</h2>
      <p>MACD is calculated as the difference between a shorter EMA and a longer EMA (commonly 12 and 26 periods). When the shorter EMA is above the longer one, MACD is positive, reflecting upward momentum; when below, it's negative.</p>

      <h2 id="components">MACD line, signal line, and histogram</h2>
      <p>The <strong>MACD line</strong> is that difference itself. The <strong>signal line</strong> is a further EMA (commonly 9-period) of the MACD line, smoothing it out. The <strong>histogram</strong> plots the gap between the MACD line and signal line as bars, making momentum shifts visually easy to spot.</p>

      <h2 id="crossovers">How traders use crossovers</h2>
      <p>A common signal is watching for the MACD line to cross above the signal line (often read as bullish) or below it (often read as bearish). Like most crossover-based indicators, MACD tends to work better in trending markets and generates more false signals during sideways, choppy conditions.</p>
    `
  },

  "bollinger-bands": {
    lede: "Bollinger Bands wrap a moving average with an upper and lower band based on price volatility, expanding and contracting as the market gets more or less volatile.",
    body: `
      <h2 id="what">What they are</h2>
      <p>Bollinger Bands consist of a middle line (typically a 20-period SMA) and two outer bands set a certain number of standard deviations away from it. Because standard deviation measures how spread out recent prices have been, the bands widen during volatile periods and narrow during calm ones.</p>

      <h2 id="volatility">Reading expansion and contraction</h2>
      <p>A period of unusually narrow bands — called a "squeeze" — often precedes a significant price move, since low volatility tends not to last. Wide bands, conversely, often follow a big move and can signal that volatility (and the move itself) may be due to cool off.</p>

      <h2 id="use">How traders use them</h2>
      <p>Price touching or exceeding the upper band is sometimes read as relatively expensive in the short term; touching the lower band, relatively cheap — though during a strong trend, price can "walk the band," repeatedly touching or riding along one side without reversing, which trips up traders expecting an automatic bounce.</p>
    `
  },

  "atr": {
    lede: "ATR (Average True Range) measures how much a stock typically moves over a given period, in absolute price terms — a direct read on volatility rather than direction.",
    body: `
      <h2 id="what">What ATR measures</h2>
      <p>ATR calculates the average size of a stock's trading range (accounting for gaps) over a set lookback, commonly 14 periods. A stock with an ATR of ₹20 typically moves about ₹20 in a given session; a stock with an ATR of ₹2 moves much less.</p>

      <h2 id="use">How it's used</h2>
      <p>ATR doesn't say anything about direction — only about typical movement size. This makes it especially useful for setting a <a href="article.html?slug=stop-loss">stop-loss</a> distance that accounts for a stock's normal volatility (too tight a stop on a high-ATR stock gets hit by ordinary noise) and for sizing positions so that a stop-out represents a consistent amount of risk across different stocks.</p>
    `
  },

  "adx": {
    lede: "ADX (Average Directional Index) measures how strong a trend is, without indicating whether that trend is up or down.",
    body: `
      <h2 id="what">What ADX measures</h2>
      <p>ADX is plotted on a 0–100 scale. Low readings (commonly below 20–25) suggest a weak or absent trend — often a sideways, range-bound market. Higher readings suggest a strong trend, though ADX says nothing about which direction that trend is moving in.</p>

      <h2 id="reading">Reading ADX levels</h2>
      <p>A rising ADX suggests trend strength is increasing, regardless of direction; a falling ADX suggests the current trend (whatever it is) is losing steam. Because of this, ADX is often used to decide whether trend-following tools are likely to work well right now, rather than as a buy or sell signal itself.</p>

      <h2 id="didm">Combining with +DI and -DI</h2>
      <p>ADX is typically plotted alongside two companion lines, +DI and -DI, which do indicate direction — the relationship between them shows whether buying or selling pressure currently dominates, while ADX itself shows how strongly that pressure is being expressed.</p>
    `
  },

  "volume": {
    lede: "Volume measures how many shares changed hands over a given period — a direct read on participation and conviction behind a price move, not just its size.",
    body: `
      <h2 id="what">What volume measures</h2>
      <p>Every trade involves both a buyer and a seller, and volume counts the shares exchanged, regardless of direction. High volume means many participants were active; low volume means relatively few were.</p>

      <h2 id="confirms">Volume confirming price moves</h2>
      <p>A price move on high volume is generally considered more meaningful — more participants agree with the direction — than the same-sized move on low volume, which could simply reflect a lack of interest either way rather than genuine conviction.</p>

      <h2 id="breakouts">Volume in breakouts</h2>
      <p>A <a href="article.html?slug=breakout-trading">breakout</a> from a support or resistance level accompanied by a surge in volume is generally treated as more likely to hold than a breakout on thin volume, which is more prone to being a false move that quickly reverses.</p>
    `
  },

  "open-interest": {
    lede: "Open Interest (OI) counts the total number of outstanding derivative contracts — futures or options — that haven't yet been closed out, offering a window into how much capital is actually committed to a position.",
    body: `
      <h2 id="what">What OI measures</h2>
      <p>Unlike <a href="article.html?slug=volume">volume</a>, which resets and counts activity within a period, open interest is a running total: it rises when new contracts are created (a buyer and seller both opening new positions) and falls when contracts are closed out.</p>

      <h2 id="vs-volume">OI vs volume</h2>
      <p>High volume with flat or falling open interest suggests existing positions are being closed out rather than new ones opened — often seen near expiry. High volume with rising open interest suggests fresh money is entering the market, generally viewed as a stronger signal of genuine new interest.</p>

      <h2 id="interpretation">How traders interpret OI changes</h2>
      <p>Rising price with rising OI is often read as a healthy, well-supported uptrend (new buyers actively entering); rising price with falling OI can suggest the move is driven more by short covering than fresh buying, and may be less durable. This kind of price-and-OI cross-reading is common in <a href="article.html?slug=futures-trading">futures</a> and <a href="article.html?slug=options-trading">options</a> analysis.</p>
    `
  },

  "fibonacci": {
    lede: "Fibonacci retracement levels use ratios derived from the Fibonacci number sequence to estimate where a price pullback might pause or reverse within a larger trend.",
    body: `
      <h2 id="origin">Where the ratios come from</h2>
      <p>The Fibonacci sequence (0, 1, 1, 2, 3, 5, 8, 13...) produces ratios — most notably 61.8% and 38.2% — that appear repeatedly in nature and, traders argue, in market behavior as well. Technical analysts apply these ratios to a recent price swing to mark potential support or resistance levels during a retracement.</p>

      <h2 id="levels">Common levels</h2>
      <p>The most-watched retracement levels are 23.6%, 38.2%, 50% (not technically a Fibonacci ratio, but conventionally included), 61.8%, and sometimes 78.6%. These are drawn between a swing high and swing low to identify where a pullback within the larger move might find support or resistance.</p>

      <h2 id="use">Retracements and extensions</h2>
      <p>Retracement levels estimate where a pullback might end within an existing trend; extension levels, drawn the same way but projected beyond the original swing, estimate potential targets once a trend resumes past its prior high or low.</p>

      <h2 id="caution">A note of caution</h2>
      <p>Fibonacci levels work partly because so many traders watch the same levels, creating a degree of self-fulfilling behavior — not because of any proven mathematical law governing price. They're best used alongside other confirming signals like <a href="article.html?slug=support">support</a>, volume, or candlestick patterns, not in isolation.</p>
    `
  },

  "dow-theory": {
    lede: "Dow Theory, developed by Charles Dow in the late 1800s, laid the conceptual foundation that almost all modern technical analysis still builds on.",
    body: `
      <h2 id="origins">Origins</h2>
      <p>Charles Dow, co-founder of the Wall Street Journal and creator of the Dow Jones Industrial Average, never wrote a single formal treatise on his theory — it was pieced together from his editorials after his death. Even so, its core ideas remain foundational.</p>

      <h2 id="tenets">Core tenets</h2>
      <p>Dow Theory holds that the market discounts all available information into price, that markets move in three simultaneous trends of different length (primary, secondary, and minor), that a primary trend has three phases (accumulation, public participation, and distribution — ideas later expanded significantly by <a href="article.html?slug=wyckoff-method">Wyckoff</a>), that volume should confirm the trend, and that a trend remains in effect until a clear reversal signal appears.</p>

      <h2 id="relevance">Relevance today</h2>
      <p>Modern technical analysis — support and resistance, trend identification, using volume to confirm moves — is essentially Dow Theory's core logic, formalized and expanded with newer tools. Understanding it gives context for why so many later techniques work the way they do.</p>
    `
  },

  "elliott-wave": {
    lede: "Elliott Wave Theory proposes that market prices move in repeating patterns of five waves in the direction of the trend, followed by three corrective waves against it — driven by collective investor psychology.",
    body: `
      <h2 id="origins">Origins</h2>
      <p>Developed by Ralph Nelson Elliott in the 1930s, the theory argues that crowd psychology moves through recognizable, repeating cycles of optimism and pessimism, and that these cycles leave a fairly consistent footprint on price charts across all timeframes.</p>

      <h2 id="structure">The five-three wave structure</h2>
      <p>A complete Elliott cycle consists of a five-wave "impulse" move in the direction of the larger trend (waves 1 through 5), followed by a three-wave "corrective" move against it (labeled A, B, C). Each of these waves can itself be broken down into smaller five- and three-wave structures, nested within the larger pattern — a fractal-like structure.</p>

      <h2 id="criticism">A widely acknowledged criticism</h2>
      <p>Elliott Wave is powerful in theory but notoriously difficult to apply consistently in practice — because wave counts can often be labeled multiple valid ways in real time, different analysts frequently reach different conclusions from the same chart. It's generally considered one of the more advanced and subjective tools in technical analysis, best used by experienced chart readers rather than as a first indicator to learn.</p>
    `
  },

  "wyckoff-method": {
    lede: "The Wyckoff Method, developed by Richard Wyckoff in the early 1900s, explains price and volume behavior through the lens of large, informed operators deliberately accumulating or distributing a position.",
    body: `
      <h2 id="origins">Origins</h2>
      <p>Richard Wyckoff studied the behavior of the market's most successful operators in the early 20th century and codified what he observed into a repeatable framework — one of the earliest serious attempts to understand markets from the perspective of large participants rather than the average retail trader.</p>

      <h2 id="phases">Accumulation and distribution phases</h2>
      <p><strong>Accumulation</strong> describes a phase where large operators quietly build a position, typically after a decline, causing a sideways, range-bound period that looks unremarkable to most observers. <strong>Distribution</strong> is the mirror phase near a top, where those same large operators sell their position into strength before the broader market recognizes a decline is coming.</p>

      <h2 id="compositeman">The Composite Man</h2>
      <p>Wyckoff proposed thinking of all large, informed market activity as a single hypothetical "Composite Man" — planning and executing moves deliberately to buy low and sell high at the expense of less-informed participants. Reading price and volume through this lens means constantly asking: what would a large, well-informed operator be doing right now?</p>

      <h2 id="modern">Relevance to Smart Money Concepts</h2>
      <p>Wyckoff's ideas are a direct historical ancestor of the modern <a href="article.html?slug=smart-money-concepts">Smart Money Concepts</a> framework covered in the next section — both are built on the premise that price action reflects the deliberate footprints of large, informed participants, not random noise.</p>

      <h2 id="next">Where to go next</h2>
      <p>This closes Technical Analysis, the largest section in the Codex. <a href="article.html?slug=market-structure">Smart Money Concepts</a> continues directly from Wyckoff's ideas, into modern institutional order-flow frameworks.</p>
    `
  },

  "market-structure": {
    lede: "Market structure is the skeleton of a trend, described purely through the sequence of highs and lows a price makes — no indicators required.",
    body: `
      <h2 id="what">What market structure means</h2>
      <p>Every price chart can be broken down into a series of swing highs and swing lows. The pattern those swings form — whether each new high is higher than the last, or each new low is lower — is what traders mean by "structure," and it's the most direct way to read a trend without relying on any indicator.</p>

      <h2 id="uptrend">Uptrend vs downtrend structure</h2>
      <p>An uptrend is defined by a sequence of <strong>higher highs</strong> and <strong>higher lows</strong> — each rally exceeds the last peak, and each pullback holds above the last trough. A downtrend mirrors this with <strong>lower highs</strong> and <strong>lower lows</strong>. As long as this pattern continues, the trend is considered structurally intact.</p>

      <h2 id="why">Why structure matters</h2>
      <p>Structure gives traders an objective way to define a trend and to spot when it's changing, since a break in the expected pattern — a failure to make a higher high, or a drop below a prior higher low — is often the first sign a trend may be shifting. This is the foundation for <a href="article.html?slug=break-of-structure">Break of Structure</a> and <a href="article.html?slug=change-of-character">Change of Character</a>, covered later in this section.</p>
    `
  },

  "liquidity": {
    lede: "In a Smart Money Concepts context, liquidity refers to the pools of resting orders — stop-losses, pending breakout entries — that sit clustered around obvious price levels, waiting to be triggered.",
    body: `
      <h2 id="what">What liquidity means here</h2>
      <p>Every trader who buys near a recent low typically places a stop-loss just below it; every breakout trader watching a recent high typically has a pending buy order just above it. These clusters of orders are what Smart Money Concepts traders call "liquidity" — and unlike the everyday sense of the word, it refers specifically to where a large number of orders are concentrated, not just to how easily an asset trades.</p>

      <h2 id="where">Where liquidity sits</h2>
      <p>Liquidity tends to pool just beyond obvious swing highs and lows — the exact prices retail traders commonly use for stop-losses and breakout entries, because those levels are visually obvious to everyone looking at the same chart.</p>

      <h2 id="drawn">Why price is drawn to liquidity</h2>
      <p>The core argument behind this framework is that large institutional orders need a large pool of opposing orders to trade against in order to fill without moving the price too much against themselves — and that resting liquidity beyond an obvious high or low provides exactly that. This idea underpins <a href="article.html?slug=liquidity-sweeps">Liquidity Sweeps</a>, covered later in this section.</p>
    `
  },

  "smart-money-concepts": {
    lede: "Smart Money Concepts (SMC) is a trading framework built on the idea that large institutional participants leave identifiable footprints on a price chart, and that retail traders can improve their odds by reading and following those footprints.",
    body: `
      <h2 id="what">What SMC is</h2>
      <p>SMC packages ideas about institutional order flow — where large players are likely accumulating or distributing, and where they're likely to draw price toward pools of liquidity — into a specific vocabulary and set of chart patterns that retail traders can learn to recognize.</p>

      <h2 id="premise">The core premise</h2>
      <p>The underlying argument is a direct descendant of <a href="article.html?slug=wyckoff-method">Wyckoff's Composite Man</a> concept: markets aren't moved by a random crowd, but are meaningfully influenced by a smaller number of large, well-capitalized participants whose activity can be inferred from specific patterns in price and volume.</p>

      <h2 id="blocks">The building blocks</h2>
      <p>The vocabulary covered across this section — <a href="article.html?slug=break-of-structure">Break of Structure</a>, <a href="article.html?slug=change-of-character">Change of Character</a>, <a href="article.html?slug=order-blocks">Order Blocks</a>, <a href="article.html?slug=fair-value-gap">Fair Value Gaps</a>, and <a href="article.html?slug=liquidity-sweeps">Liquidity Sweeps</a> — together make up the practical toolkit most SMC traders use.</p>

      <h2 id="caution">A note of caution</h2>
      <p>SMC concepts are popular, but they're also debated: because many of the patterns are identified with the benefit of hindsight and there's no single, universally agreed definition for several of the terms, it's easy for two traders to label the same chart differently after the fact. Treat SMC as one lens among several, not a guaranteed system.</p>
    `
  },

  "ict-concepts": {
    lede: "ICT (Inner Circle Trader) refers to a specific, highly influential methodology — developed and taught by trader Michael J. Huddleston — that originated much of the vocabulary now used across Smart Money Concepts more broadly.",
    body: `
      <h2 id="what">What ICT means</h2>
      <p>ICT is both the name of the methodology and the online handle of its creator. Many terms now used loosely across the broader Smart Money Concepts community — order blocks, fair value gaps, liquidity sweeps — originate from or were significantly popularized by ICT's teaching material.</p>

      <h2 id="relationship">ICT vs the broader SMC label</h2>
      <p>In practice, "SMC" is often used today as an umbrella term covering ICT concepts alongside similar ideas from other traders and educators, since the vocabulary has spread and been adapted well beyond its original source. The two labels overlap heavily but aren't strictly identical.</p>

      <h2 id="ideas">Core ideas associated with ICT</h2>
      <p>Beyond the concepts covered elsewhere in this section, ICT methodology also emphasizes specific trading time windows ("kill zones") tied to when major markets open, based on the idea that institutional activity — and therefore the patterns ICT traders look for — concentrates around those windows.</p>

      <h2 id="caution">A note of caution</h2>
      <p>As with SMC broadly, ICT concepts are widely taught but not universally validated by independent, rigorous testing — approach them as a structured way of reading price action, not a guaranteed edge.</p>
    `

  "break-of-structure": {
    lede: "A Break of Structure (BOS) occurs when price moves past a prior significant high or low in the direction of the existing trend, treated as confirmation that the trend remains intact.",
    body: `
      <h2 id="what">What BOS means</h2>
      <p>In an uptrend, a BOS happens when price breaks above the most recent significant swing high; in a downtrend, when it breaks below the most recent significant swing low. It's a continuation signal — evidence the existing trend is still in control.</p>

      <h2 id="identify">How it's identified</h2>
      <p>Traders mark the relevant swing high or low on the chart and watch for a decisive close beyond it, rather than just a brief wick poking through — a close-based break is generally considered more reliable evidence of genuine continuation than a momentary spike.</p>

      <h2 id="use">Use in trade confirmation</h2>
      <p>A BOS is often used to confirm that a pullback within a trend has ended and the trend is resuming, giving traders more confidence to enter in the trend's direction rather than trying to guess the exact bottom or top of a pullback.</p>
    `
  },

  "change-of-character": {
    lede: "A Change of Character (CHoCH) is the first structural break against the prevailing trend — the earliest technical signal that a trend may be shifting.",
    body: `
      <h2 id="what">What CHoCH means</h2>
      <p>Where a <a href="article.html?slug=break-of-structure">Break of Structure</a> confirms a trend is continuing, a CHoCH does the opposite: in an uptrend, it occurs when price fails to make a new higher high and instead breaks below the most recent higher low — the first crack in an otherwise intact structure.</p>

      <h2 id="vs-bos">CHoCH vs BOS</h2>
      <p>The two terms describe opposite outcomes of the same underlying question — did price break structure with the trend, or against it. A CHoCH is inherently an early, lower-confidence signal, since a single broken level doesn't guarantee a full trend reversal is underway.</p>

      <h2 id="use">How traders use it</h2>
      <p>Because a CHoCH appears early, many traders treat it as a signal to tighten risk management or stop adding to existing trend-following positions, while waiting for further confirmation — such as a subsequent BOS in the new direction — before committing to a reversal trade.</p>
    `
  },

  "supply-and-demand": {
    lede: "Supply and demand zones mark specific price areas where a strong, imbalanced move originated — read as evidence of where large buying or selling pressure previously entered the market.",
    body: `
      <h2 id="what">What these zones are</h2>
      <p>A demand zone is an area where price rose sharply after a period of consolidation, suggesting concentrated buying interest. A supply zone is the mirror: an area where price fell sharply after consolidating, suggesting concentrated selling interest. Traders watch for price to return to these zones, expecting the same imbalance to reassert itself.</p>

      <h2 id="identify">How zones are identified</h2>
      <p>A zone is typically marked around the last few candles of consolidation just before a strong, fast move away from that area — the reasoning being that whatever caused that imbalance (a large order, a piece of news) may still be relevant if price returns to the same level.</p>

      <h2 id="vs-supportresistance">Relation to support and resistance</h2>
      <p>Supply and demand zones are conceptually similar to <a href="article.html?slug=support">support</a> and <a href="article.html?slug=resistance">resistance</a>, but are usually drawn as a price range (a zone) rather than a single precise line, and are specifically tied to the candle pattern that preceded a strong move rather than just a prior touch point.</p>
    `
  },

  "order-blocks": {
    lede: "An order block is the last opposing candle before a sharp, strong price move — treated in Smart Money Concepts as a likely footprint of large institutional orders.",
    body: `
      <h2 id="what">What an order block is</h2>
      <p>Before a strong rally, there's often one final down candle right before price turns and surges higher — that candle is marked as a bullish order block. Before a strong decline, the final up candle before the drop is marked as a bearish order block. The logic is that a large institutional order, too big to fill in one go, was being absorbed at that specific candle before driving price away sharply.</p>

      <h2 id="bullbear">Bullish vs bearish order blocks</h2>
      <p>A <strong>bullish order block</strong> is used as a potential support zone, where traders look to buy if price returns to it. A <strong>bearish order block</strong> is used as a potential resistance zone, where traders look to sell if price returns to it — functioning much like a more narrowly defined <a href="article.html?slug=supply-and-demand">supply or demand zone</a>.</p>

      <h2 id="use">How traders use them as entries</h2>
      <p>Rather than chasing a move after it's already happened, traders using order blocks wait for price to pull back into the identified block, hoping to enter at a more favorable price with a tightly defined stop-loss just beyond the block itself.</p>
    `
  },

  "fair-value-gap": {
    lede: "A Fair Value Gap (FVG) is a visible gap left in price when a move happens so quickly that trading didn't occur continuously through every price level — an inefficiency some traders expect the market to eventually revisit.",
    body: `
      <h2 id="what">What an FVG is</h2>
      <p>An FVG is typically identified across three consecutive candles: when the wick of the first candle and the wick of the third candle don't overlap, the untouched space between them is marked as the gap — visual evidence that price moved through that zone without much two-sided trading.</p>

      <h2 id="why">Why it forms</h2>
      <p>Fair value gaps tend to form during fast, one-directional moves — often around news or a strong institutional order — where buyers or sellers were so dominant that price simply skipped through a range rather than trading back and forth within it.</p>

      <h2 id="fill">Why traders expect it to "fill"</h2>
      <p>The common expectation is that price will eventually return to "fill" this gap, trading back through the skipped zone before continuing in its original direction — treated as a natural rebalancing of an otherwise inefficient move. This isn't guaranteed, and gaps can go unfilled for long periods or never fill at all.</p>
    `
  },

  "liquidity-sweeps": {
    lede: "A liquidity sweep occurs when price briefly pushes past an obvious high or low — triggering the stop-losses and breakout orders clustered there — before sharply reversing in the opposite direction.",
    body: `
      <h2 id="what">What a sweep is</h2>
      <p>Picture a stock sitting just below a well-known resistance level. Many traders have stop-losses on short positions, or pending buy orders, just above that level. A liquidity sweep happens when price briefly spikes above that level — triggering those orders — before reversing hard and moving lower, leaving late buyers trapped.</p>

      <h2 id="why">Why they happen</h2>
      <p>The Smart Money Concepts explanation ties directly back to <a href="article.html?slug=liquidity">liquidity</a>: a large seller needing to fill a big order may specifically push price into a pool of resting buy orders above an obvious high, using that liquidity to execute their own sell order, before letting price fall back down.</p>

      <h2 id="use">Using sweeps as reversal signals</h2>
      <p>Traders who spot a sweep — a sharp, brief breach of an obvious level immediately followed by a strong reversal — sometimes use it as a higher-confidence reversal signal, on the theory that the "obvious" breakout traders have just been trapped and are now forced sellers (or buyers) as the reversal accelerates.</p>
    `
  },

  "institutional-trading-concepts": {
    lede: "Institutional trading concepts describe how large players — funds, banks, proprietary trading firms — approach the market differently from an individual retail trader, purely because of the size of capital they're moving.",
    body: `
      <h2 id="different">How institutions trade differently</h2>
      <p>A retail trader buying a few hundred shares can execute instantly without meaningfully affecting the price. An institution buying millions of shares can't — a single large order would move the price sharply against itself if placed all at once. This constraint is the root explanation behind most Smart Money Concepts ideas: large players need to break up orders, seek out liquidity, and often deliberately obscure their intentions to get a large position filled at a reasonable average price.</p>

      <h2 id="tying">Tying the section together</h2>
      <p>Every concept in this section — <a href="article.html?slug=market-structure">market structure</a>, <a href="article.html?slug=liquidity">liquidity</a>, <a href="article.html?slug=order-blocks">order blocks</a>, <a href="article.html?slug=fair-value-gap">fair value gaps</a>, <a href="article.html?slug=liquidity-sweeps">liquidity sweeps</a> — is an attempt to infer this institutional behavior from the footprints it leaves on a chart, building directly on the groundwork laid a century earlier by <a href="article.html?slug=wyckoff-method">Wyckoff</a>.</p>

      <h2 id="caution">A practical note for retail traders</h2>
      <p>These frameworks are genuinely useful for thinking about price in terms of order flow rather than just indicators, but no framework — SMC included — offers certainty. Combining these concepts with solid <a href="article.html?slug=risk-management">risk management</a> matters more than getting any single interpretation "right."</p>

      <h2 id="next">Where to go next</h2>
      <p>Next: <a href="article.html?slug=price-action">Price Action & Strategy</a>, covering candlestick and chart patterns, breakouts, pullbacks, and the broader strategies traders build around them.</p>
    `
  },

  "price-action": {
    lede: "Price action is the practice of making trading decisions from the raw movement of price itself — candle shapes, swing structure, and pattern behavior — without relying primarily on indicators.",
    body: `
      <h2 id="what">What price action means</h2>
      <p>Every indicator covered in the Technical Analysis section is, at its core, derived from price. Price action trading skips that derivation step and reads the raw candles and structure directly — the reasoning being that indicators always lag price by definition, since they're calculated from it.</p>

      <h2 id="vs-indicators">Price action vs indicator-based trading</h2>
      <p>This isn't an argument that indicators are useless — many price action traders still use a handful, like moving averages, as supporting context. The distinction is one of primary focus: a price action trader's first read is always the chart's raw candles and structure, with indicators playing a secondary, confirming role at most.</p>

      <h2 id="whatcovered">What this section covers</h2>
      <p>The entries ahead move from reading individual candlestick and chart patterns, through specific strategies — breakouts, pullbacks, momentum, gaps — to the broader philosophies of trend following and mean reversion that many strategies ultimately fall under.</p>
    `
  },

  "candlestick-patterns": {
    lede: "Candlestick patterns are specific, recurring arrangements of one or more candles that traders read as clues about a potential shift or continuation in price direction.",
    body: `
      <h2 id="single">Single-candle patterns</h2>
      <p>A <strong>doji</strong> — where open and close are nearly equal — signals indecision, often appearing at potential turning points. A <strong>hammer</strong> has a small body near the top of its range with a long lower wick, suggesting sellers pushed price down but buyers strongly rejected the move, often seen after a decline. A <strong>shooting star</strong> is the mirror image, often seen after a rally.</p>

      <h2 id="multi">Multi-candle patterns</h2>
      <p>An <strong>engulfing pattern</strong> occurs when one candle's body completely covers the previous candle's body in the opposite direction — a bullish engulfing after a decline suggests buyers have decisively taken control. A <strong>morning star</strong> (bullish) or <strong>evening star</strong> (bearish) is a three-candle reversal pattern showing a stalling move followed by a strong reversal candle.</p>

      <h2 id="context">Why context matters more than the shape</h2>
      <p>The same candle shape means very different things depending on where it appears — a hammer after a long decline near a known <a href="article.html?slug=support">support</a> level carries far more weight than the identical shape appearing in the middle of a sideways range. Patterns are a starting point for further analysis, not a standalone signal.</p>
    `
  },

  "chart-patterns": {
    lede: "Chart patterns are larger, multi-candle shapes traders identify to anticipate whether a trend is likely to continue or reverse — the bigger-picture cousin of individual candlestick patterns.",
    body: `
      <h2 id="what">What chart patterns are</h2>
      <p>Where a candlestick pattern forms over one to three candles, a chart pattern forms over many — days, weeks, or longer — capturing a broader shift in the balance between buyers and sellers as it develops visually on the chart.</p>

      <h2 id="categories">The two broad categories</h2>
      <p>Chart patterns are generally grouped into <a href="article.html?slug=continuation-patterns">continuation patterns</a>, which suggest an existing trend is likely to resume after a pause, and <a href="article.html?slug=reversal-patterns">reversal patterns</a>, which suggest a trend is running out of steam and may turn — each covered in its own entry next.</p>

      <h2 id="use">Using chart patterns well</h2>
      <p>Chart patterns work best combined with confirming evidence — volume expanding on a breakout from the pattern, or the pattern appearing at a level that already carries significance, such as a major <a href="article.html?slug=support">support</a> or <a href="article.html?slug=resistance">resistance</a> zone.</p>
    `
  },

  "continuation-patterns": {
    lede: "A continuation pattern forms when a trend pauses to consolidate before resuming in its original direction — a rest stop, not a turning point.",
    body: `
      <h2 id="common">Common continuation patterns</h2>
      <p>A <strong>flag</strong> is a short, slightly counter-trend consolidation following a sharp move, resembling a small rectangle or channel tilted against the trend. A <strong>pennant</strong> is similar but converges to a point, like a small symmetrical triangle. A <strong>rectangle</strong> shows price bouncing between clear horizontal support and resistance before eventually breaking out in the direction of the prior trend.</p>

      <h2 id="why">Why they form</h2>
      <p>These patterns typically reflect a healthy pause — early participants taking partial profits, new participants waiting for a better entry — rather than a genuine loss of conviction in the trend. Volume often shrinks during the pattern itself and expands again once price breaks out and the trend resumes.</p>

      <h2 id="trading">Trading them</h2>
      <p>Traders commonly wait for a confirmed breakout in the direction of the prior trend before entering, rather than trying to anticipate the exact moment the pause ends — entering too early risks getting caught if the "pause" turns out to be an early reversal instead.</p>
    `
  },

  "reversal-patterns": {
    lede: "A reversal pattern forms when a trend is genuinely losing strength, signaling that the prior direction may be ending rather than just pausing.",
    body: `
      <h2 id="common">Common reversal patterns</h2>
      <p>A <strong>head and shoulders</strong> pattern shows three peaks, with the middle one higher than the two on either side, suggesting a topping process after an uptrend (an inverse version signals bottoming after a downtrend). A <strong>double top</strong> or <strong>double bottom</strong> shows price failing twice at roughly the same level, suggesting that level is a genuine ceiling or floor.</p>

      <h2 id="why">Why they form</h2>
      <p>Reversal patterns typically reflect a real shift in the balance of buyers and sellers — the trend attempts to continue but repeatedly fails at a similar level, evidence that the participants who were driving it are running out of conviction or capital.</p>

      <h2 id="trading">Trading them</h2>
      <p>As with continuation patterns, most traders wait for confirmation — a decisive break of the pattern's "neckline" or support level — rather than assuming a reversal is happening the moment the pattern starts to take shape, since an incomplete pattern can still resolve as a continuation instead.</p>
    `
  },

  "breakout-trading": {
    lede: "Breakout trading enters a position as price decisively moves beyond a defined level — a resistance line, a chart pattern boundary, a range — betting that the move will continue rather than reverse.",
    body: `
      <h2 id="what">What a breakout is</h2>
      <p>A breakout occurs when price closes beyond a well-established support, resistance, or pattern boundary that had previously contained it, often accompanied by increased volume and momentum.</p>

      <h2 id="entering">Entering a breakout</h2>
      <p>Breakout traders typically enter as soon as the level is decisively broken, aiming to capture the strong initial move that often follows — accepting a less favorable entry price in exchange for higher confidence that the move is genuinely underway.</p>

      <h2 id="false">False breakouts</h2>
      <p>Not every breakout holds — price sometimes pokes through a level briefly before reversing back inside the prior range, a pattern closely related to the <a href="article.html?slug=liquidity-sweeps">liquidity sweeps</a> covered in Smart Money Concepts. Waiting for a confirmed close beyond the level, and checking for supporting volume, helps filter out some (not all) false breakouts.</p>
    `
  },

  "pullback-trading": {
    lede: "Pullback trading waits for a short-term retracement within an established trend, entering at a more favorable price rather than chasing the initial breakout move.",
    body: `
      <h2 id="what">What it is</h2>
      <p>Rather than buying as a stock breaks out to a new high, a pullback trader waits for price to retrace part of that move — often back toward a moving average, a broken resistance level, or a Fibonacci retracement zone — before entering in the direction of the larger trend.</p>

      <h2 id="tradeoff">The trade-off vs breakout trading</h2>
      <p>Pullback trading generally offers a better entry price and a tighter, more logical stop-loss than chasing a breakout directly. The cost is the risk that the pullback continues further than expected and becomes a genuine trend reversal rather than a shallow retracement — meaning the trade never triggers, or triggers right before the trend actually fails.</p>

      <h2 id="where">Where pullbacks are commonly bought</h2>
      <p>Common pullback entry zones include a rising moving average, a previously broken resistance level now acting as support, or a standard Fibonacci retracement level such as 38.2% or 61.8% — the topic covered in <a href="article.html?slug=fibonacci">Fibonacci</a>.</p>
    `
  },

  "momentum-trading": {
    lede: "Momentum trading buys strength and sells weakness — entering in the direction a stock is already moving strongly, on the theory that a strong move tends to keep going, at least for a while.",
    body: `
      <h2 id="what">What it is</h2>
      <p>Rather than waiting for a pullback or a specific pattern, a momentum trader looks for stocks already showing unusually strong directional movement — often driven by news, earnings, or heavy volume — and trades in that direction, aiming to capture the continuation of an already-established move.</p>

      <h2 id="tools">Tools commonly used</h2>
      <p>Momentum traders often lean on indicators built specifically to measure the strength of a move, such as <a href="article.html?slug=rsi">RSI</a> and <a href="article.html?slug=adx">ADX</a>, alongside a close read of volume to confirm that genuine participation is behind the move rather than a thin, easily reversed spike.</p>

      <h2 id="risk">The core risk</h2>
      <p>Momentum can reverse suddenly and without much warning, particularly once a move becomes crowded with other momentum traders chasing the same strength — entries tend to come later in the move by definition, leaving less room for error if the trend stalls.</p>
    `
  },

  "gap-trading": {
    lede: "A gap occurs when a stock opens significantly higher or lower than its previous close, leaving a visible empty space on the chart — and gap trading is the set of strategies built around how price behaves afterward.",
    body: `
      <h2 id="why">Why gaps happen</h2>
      <p>Gaps typically form due to news released while markets are closed — earnings results, major announcements — that shift the market's fair-value estimate before trading resumes, causing the next session to open well away from the prior close rather than trading through every price in between.</p>

      <h2 id="types">Gap-fill vs gap-and-go</h2>
      <p>Some gaps "fill" — price retraces back to the pre-gap level shortly after opening, often used by traders betting the initial reaction was overdone. Others are "gap-and-go" moves, where price continues strongly in the direction of the gap without looking back, typically when the underlying news is significant enough to justify a lasting shift in value.</p>

      <h2 id="approach">Trading around gaps</h2>
      <p>Because gaps can resolve in either direction, many traders wait for the first few minutes of trading to establish a clearer read on which behavior is playing out, rather than committing to a direction the instant the market opens.</p>
    `
  },

  "trend-following": {
    lede: "Trend following is the broad philosophy of trading in the direction of an established trend, on the assumption that a trend in motion is more likely to continue than to reverse.",
    body: `
      <h2 id="philosophy">The core philosophy</h2>
      <p>Trend followers don't try to predict tops or bottoms — they aim to identify a trend that's already underway and ride it for as long as it continues, accepting that they'll always enter somewhat late and exit somewhat late in exchange for capturing the bulk of a sustained move.</p>

      <h2 id="tools">How it's implemented</h2>
      <p>Most of this section's strategies — <a href="article.html?slug=breakout-trading">breakout trading</a>, <a href="article.html?slug=pullback-trading">pullback trading</a>, <a href="article.html?slug=momentum-trading">momentum trading</a> — are specific implementations of trend following. Tools like <a href="article.html?slug=moving-averages">moving averages</a> and <a href="article.html?slug=adx">ADX</a> are commonly used to confirm a trend is genuinely present before committing to it.</p>

      <h2 id="tradeoff">The core trade-off</h2>
      <p>Trend following tends to produce a high number of small losses during choppy, sideways markets (where trends keep failing shortly after they're identified), offset by a smaller number of large wins during genuinely strong trending periods. Whether this trade-off works out depends heavily on discipline — cutting the small losses quickly and letting the large wins run.</p>
    `

  "mean-reversion": {

      <h2 id="philosophy">The core philosophy</h2>
      <p>Rather than assuming a strong move will continue, a mean-reversion trader assumes it will eventually revert toward some "normal" level — a moving average, a historical average price, or a well-established range — after becoming overextended in one direction.</p>

      <h2 id="tools">How it's implemented</h2>
      <p>Mean-reversion traders often lean on tools that flag overextension, such as <a href="article.html?slug=rsi">RSI</a> readings in overbought or oversold territory, or price stretching far outside its <a href="article.html?slug=bollinger-bands">Bollinger Bands</a>, treating these as signals that a snap-back is increasingly likely.</p>

      <h2 id="risk">The core risk</h2>
      <p>The central danger of mean reversion is trading against a genuinely strong trend that keeps extending far beyond what seems "normal" — a stock can stay overbought for a long stretch during a powerful rally, and fading that strength repeatedly can produce a string of losses before any reversion finally arrives, if it arrives at all.</p>

      <h2 id="next">Where to go next</h2>
      <p>This closes Price Action & Strategy. <a href="article.html?slug=risk-management">Risk & Psychology</a> comes next — arguably the most important section in the Codex, since it determines whether any of the strategies above are actually usable in practice.</p>
