  "risk-management": {
    lede: "Risk management is the practice of deciding, before you enter a trade, exactly how much you're willing to lose if you're wrong — and it matters more to long-term survival than any single strategy in this Codex.",
    body: `
      <h2 id="what">What risk management is</h2>
      <p>Every trade has an unknown outcome. Risk management doesn't try to eliminate that uncertainty — it accepts it, and instead controls how much any single unknown outcome can hurt you. In practice, that means defining a stop-loss and position size before entering, not after the trade has already moved against you.</p>

      <h2 id="whymore">Why it matters more than being "right"</h2>
      <p>A trader who's right 70% of the time but risks too much on each trade can still blow up their account on the 30% they're wrong. A trader who's right only 40% of the time but manages risk tightly can be consistently profitable, because their wins are structured to outweigh their losses. Being right matters less than surviving to trade another day.</p>

      <h2 id="principles">Core principles</h2>
      <p>Three ideas underpin almost everything in this section: define your risk before entering a trade, not during it; size each position so a loss stays small relative to your total capital, covered in <a href="article.html?slug=position-sizing">Position Sizing</a>; and structure trades so your average win is meaningfully larger than your average loss, covered in <a href="article.html?slug=risk-reward-ratio">Risk-Reward Ratio</a>.</p>
    `
  },

  "position-sizing": {
    lede: "Position sizing determines how many shares or contracts to trade on a given position — the single decision that turns a stop-loss level into an actual dollar amount of risk.",
    body: `
      <h2 id="what">What position sizing is</h2>
      <p>Two traders can use the identical entry and stop-loss on the same stock and end up with wildly different outcomes purely because of how many shares each one traded. Position sizing is what connects a percentage-of-capital risk decision to an actual number of shares.</p>

      <h2 id="how">How it's typically calculated</h2>
      <p>A common approach: decide what percentage of total capital you're willing to risk on a single trade, calculate the rupee distance between your entry and stop-loss, then divide the rupee risk amount by that per-share distance to get the number of shares to trade.</p>

      <h2 id="example">A simple example</h2>
      <p>With capital of ₹1,00,000 and a decision to risk 1% (₹1,000) per trade, on a stock entered at ₹500 with a stop-loss at ₹480 (a ₹20 per-share risk), the position size works out to ₹1,000 ÷ ₹20 = 50 shares. If the stop-loss is hit, the loss is capped at roughly ₹1,000 regardless of how many shares were bought.</p>

      <h2 id="fixedlot">Why fixing your share count is risky</h2>
      <p>Always buying the same number of shares regardless of the stop-loss distance means your actual risk varies wildly between trades — a wide stop on one trade might risk five times more than a tight stop on another, even though both used "the same" position size in share terms.</p>
    `
  },

  "risk-reward-ratio": {
    lede: "The risk-reward ratio compares how much you stand to lose if a trade goes wrong to how much you stand to gain if it goes right — a single number that shapes whether a trading approach can be profitable over time.",
    body: `
      <h2 id="what">What it is</h2>
      <p>A trade risking ₹1,000 to potentially make ₹2,000 has a risk-reward ratio of 1:2. Expressed differently, the potential reward is twice the risk being taken.</p>

      <h2 id="winrate">How it interacts with win rate</h2>
      <p>Risk-reward and win rate aren't independent — they trade off against each other. With a 1:2 risk-reward ratio, you can be profitable even winning less than half your trades (roughly 34% wins is enough to break even, ignoring costs); with a 1:1 ratio, you generally need to win more than half your trades just to break even.</p>

      <h2 id="example">A simple example</h2>
      <p>Ten trades, each risking ₹1,000 to make ₹2,000, with only 4 winners and 6 losers: four wins return ₹8,000, six losses cost ₹6,000, for a net profit of ₹2,000 — despite losing on the majority of trades. This is why professional traders often talk about risk-reward and win rate together, never one in isolation.</p>
    `
  },

  "compounding": {
    lede: "Compounding is what happens when returns are reinvested and start generating their own returns — a slow-looking process early on that accelerates meaningfully over time.",
    body: `
      <h2 id="what">What compounding means</h2>
      <p>A ₹1,00,000 account that grows 10% in a year becomes ₹1,10,000. Grow that new, larger amount by another 10% and it becomes ₹1,21,000 — the second year's gain is larger in absolute terms purely because it's compounding on a bigger base, even though the percentage return stayed the same.</p>

      <h2 id="consistency">Why consistency matters more than big wins</h2>
      <p>A steady, modest, repeatable edge compounded consistently over years tends to outperform sporadic large wins interrupted by large losses — because compounding rewards a smooth, upward-sloping equity curve far more than a volatile one that repeatedly gives back gains.</p>

      <h2 id="flipside">The flip side: compounding losses</h2>
      <p>Compounding cuts both ways. A 50% loss requires a 100% gain just to get back to even — not a 50% gain — because the loss shrinks the base that future gains have to compound from. This asymmetry is a core reason <a href="article.html?slug=risk-management">risk management</a> focuses so heavily on avoiding large single losses.</p>
    `
  },

  "trading-journal": {
    lede: "A trading journal is a running record of every trade — what was done, why, and what happened — and it's one of the most consistently recommended habits among experienced traders.",
    body: `
      <h2 id="what">What a trading journal is</h2>
      <p>At minimum, a journal logs the entry, stop-loss, target, position size, and outcome of every trade. A more useful version also captures the reasoning behind the trade and the emotional state going into it — information that's easy to forget or misremember after the fact.</p>

      <h2 id="what-to-record">What to record</h2>
      <p>Beyond the raw numbers, worth recording: which setup or strategy the trade was based on, what the chart looked like at entry (a screenshot helps), why the position size was chosen, and an honest note on whether the plan was actually followed or abandoned mid-trade.</p>

      <h2 id="why">Why it improves performance over time</h2>
      <p>Without a journal, it's easy to remember the wins vividly and forget or rationalize the losses — a recipe for repeating the same mistakes indefinitely. A journal reviewed regularly turns vague impressions ("I feel like I'm bad at breakouts") into concrete, checkable patterns ("my last eight breakout trades against the daily trend all lost").</p>

      <h2 id="why">Why psychology matters as much as strategy</h2>
      <p>A profitable strategy executed inconsistently — skipped stop-losses, oversized positions after a loss, exiting winners too early out of anxiety — can still lose money. Psychology is the layer that determines whether a sound strategy actually gets followed in real conditions, with real money on the line.</p>

      <h2 id="cycle">The core emotional cycle</h2>
      <p><a href="article.html?slug=fear">Fear</a> and <a href="article.html?slug=greed">greed</a> are the two dominant emotions traders wrestle with — fear causing hesitation or premature exits, greed causing oversized risk or an unwillingness to take profits. Most of the specific psychological traps covered in this section, from <a href="article.html?slug=overtrading">overtrading</a> to <a href="article.html?slug=revenge-trading">revenge trading</a>, trace back to one or both of these.</p>

      <h2 id="covers">What this subsection covers</h2>

  "emotional-control": {
    lede: "Emotional control is the practiced ability to follow a trading plan even when fear, excitement, or frustration are pushing you to deviate from it.",
    body: `
      <h2 id="what">What it means</h2>
      <p>Emotional control isn't the absence of emotion — every trader feels fear during a drawdown and excitement during a winning streak. It's the discipline to notice that emotion without letting it directly dictate the next decision.</p>

      <h2 id="techniques">Practical techniques</h2>
      <p>Writing a trading plan in advance — entry rules, stop-loss, target, position size — removes many decisions from the heat of the moment, when emotion is strongest. Some traders also use a simple pre-trade checklist, forcing a pause before entry rather than acting on impulse.</p>

      <h2 id="recognizing">Recognizing emotional trading as it happens</h2>
      <p>Common warning signs include moving a stop-loss further away mid-trade "to give it more room," entering a trade without a clear plan because a stock is moving fast, or increasing position size specifically to recover a recent loss — a pattern covered in more depth in <a href="article.html?slug=revenge-trading">Revenge Trading</a>.</p>

    lede: "Discipline, in a trading context, means consistently following a predefined plan — even, and especially, when a specific trade is tempting you to improvise.",
    body: `
      <h2 id="what">What discipline means</h2>
      <p>A trading plan written in a calm moment, with a clear head, is almost always better reasoned than a decision made in the middle of a fast-moving trade. Discipline is choosing to trust the earlier version of yourself who wrote the plan over the current version who wants to deviate from it.</p>

      <h2 id="vs-improvising">Sticking to a plan vs improvising</h2>
      <p>Some improvisation is inevitable — no plan anticipates every possible market condition. The distinction that matters is between adapting a plan based on new, genuinely relevant information, and abandoning it because a trade isn't going the way you emotionally wanted it to.</p>

      <h2 id="building">Building discipline over time</h2>
      <p>Discipline tends to develop through repetition and accountability — a <a href="article.html?slug=trading-journal">trading journal</a> that honestly tracks when a plan was followed versus abandoned makes it much harder to keep making the same undisciplined decision without noticing the pattern.</p>

  "fear": {
    lede: "Fear shows up throughout a trader's decision-making — often in ways that don't feel like fear in the moment, but quietly shape decisions toward caution that isn't actually justified by the trade's setup.",
    body: `
      <h2 id="how">How fear shows up in trading</h2>
      <p>Fear can cause hesitation on a valid entry signal until the best price has passed, cutting a winning trade short well before its target out of anxiety it might reverse, or avoiding trading altogether after a string of losses even when a new setup is genuinely sound.</p>

      <h2 id="fomo">Fear of missing out</h2>
      <p>Counterintuitively, fear also drives FOMO-based entries — chasing a stock that's already moved significantly, out of fear of missing further gains, often without a clear plan or defined risk. This is fear operating in the opposite direction from hesitation, but it's still fear-driven rather than plan-driven.</p>

      <h2 id="managing">Managing fear</h2>
      <p>Having a written plan with predefined entry, stop-loss, and target reduces the number of in-the-moment decisions fear can influence. Position sizing that keeps any single trade's potential loss small also reduces the emotional intensity of a losing trade, since less is genuinely at stake in absolute terms.</p>

  "greed": {
    lede: "Greed shows up as the pull to take on more risk, hold a winning position longer than planned, or chase a bigger gain than the original plan called for — and it's often harder to recognize than fear, because it feels good while it's happening.",
    body: `
      <h2 id="how">How greed shows up</h2>
      <p>Common patterns include increasing position size beyond your normal risk rules after a winning streak, refusing to take profit at a predefined target because "it could go higher," or entering a trade with no real setup simply because a stock is moving fast and others seem to be profiting from it.</p>

      <h2 id="why">Why it's dangerous</h2>
      <p>Greed tends to undo the careful risk management built into a trading plan specifically at the moments when a trader feels most confident — after a win, or during a strong trending move — which is exactly when overconfidence is most likely to lead to an oversized loss.</p>

      <h2 id="managing">Managing greed</h2>
      <p>Predefined position sizing rules and profit targets, set before a trade begins and followed regardless of how the trade "feels" once it's working, are the most direct defense — the same discipline principle covered in <a href="article.html?slug=discipline">Discipline</a>, applied specifically to moments of success rather than failure.</p>

  "overtrading": {
    lede: "Overtrading means taking more trades, or larger positions, than a sound plan actually calls for — usually driven by boredom, impatience, or a desire to force action in a market that isn't offering good setups.",
    body: `
      <h2 id="what">What overtrading is</h2>
      <p>Overtrading isn't defined by a specific number of trades — a very active intraday strategy might legitimately involve dozens of trades a day. It's defined by trading beyond what your actual plan and setups justify, often filling time with low-quality trades simply because the market is open.</p>

      <h2 id="causes">Common causes</h2>
      <p>Boredom during quiet market periods, the urge to "make back" time spent watching without a trade, and a fear of missing the next big move are common drivers. Overtrading also frequently follows either a big win (overconfidence) or a big loss (urgency to recover), tying it closely to <a href="article.html?slug=greed">greed</a> and <a href="article.html?slug=revenge-trading">revenge trading</a>.</p>

      <h2 id="avoiding">Recognizing and avoiding it</h2>
      <p>A trading journal that logs the setup behind every trade makes overtrading visible in hindsight — a cluster of trades with no clear setup, clustered around boredom or emotional periods, is a clear pattern once it's written down rather than just remembered.</p>

  "revenge-trading": {
    lede: "Revenge trading is the attempt to immediately win back a loss by trading again quickly, often with a larger position and without a proper setup — one of the most destructive patterns in trading psychology.",
    body: `
      <h2 id="what">What it is</h2>
      <p>After a loss, especially an unexpected or frustrating one, the instinct to "get it back right now" can override a trader's usual process — leading to a rushed re-entry, often sized larger than normal in an unconscious attempt to recover the loss in one trade.</p>

      <h2 id="why">Why it happens</h2>
      <p>Losses trigger a real emotional response, and trading again immediately can feel like taking control back. In practice, it usually means trading without the careful setup criteria that the original plan called for — reacting emotionally rather than following a process.</p>

      <h2 id="breaking">Breaking the cycle</h2>
      <p>Many experienced traders build in a deliberate pause after a loss — a short break away from the screen, or a hard rule against re-entering without a fresh, valid setup — specifically to interrupt the impulse to revenge trade before it turns one loss into several.</p>
    `
  },

  "money-management": {
    lede: "Money management is the broader discipline of how capital is allocated across all trading activity — a level above position sizing, which deals with capital allocation across an entire account rather than a single trade.",
    body: `
      <h2 id="what">What it means broadly</h2>
      <p>While <a href="article.html?slug=position-sizing">position sizing</a> answers "how much do I risk on this one trade," money management answers broader questions: how much of total capital should be actively deployed at once, how many open positions to hold simultaneously, and how to adjust position sizes as an account grows or shrinks.</p>

      <h2 id="ideas">General concepts worth understanding</h2>
      <p>Common ideas include reducing position sizes after a losing streak to protect capital while confidence and process are rebuilt, avoiding overconcentration in correlated positions that could all move against you at once, and keeping enough capital uncommitted to take advantage of new opportunities rather than being fully deployed at all times. These are general concepts to understand, not a one-size-fits-all formula — the right approach depends on individual capital, goals, and risk tolerance.</p>

      <h2 id="next">Relation to portfolio management</h2>
      <p>Money management principles feed directly into <a href="article.html?slug=portfolio-management">Portfolio Management</a>, which looks specifically at how a collection of positions is structured and diversified over the longer term.</p>
    `

  "portfolio-management": {
    lede: "Portfolio management is the practice of structuring a collection of positions — rather than any single trade — to balance overall risk and return.",
    body: `
      <h2 id="what">What it is</h2>
      <p>Where individual trade analysis asks "should I buy this stock," portfolio management asks "how does this stock fit alongside everything else I already hold" — considering overall exposure, correlation between positions, and how the whole collection behaves together.</p>

      <h2 id="diversification">Diversification</h2>
      <p>Diversification spreads capital across positions that don't all move together, reducing the chance that a single event severely damages the entire portfolio at once. This can mean spreading across sectors, market caps, or even asset classes, rather than concentrating heavily in a handful of closely related stocks.</p>

      <h2 id="rebalancing">Rebalancing</h2>
      <p>Over time, some positions grow faster than others, shifting a portfolio's original balance. Rebalancing means periodically trimming positions that have grown to an outsized share of the portfolio and adding to those that have shrunk, to bring the overall allocation back toward the original intended balance.</p>

      <h2 id="next">Where to go next</h2>

  "options-trading": {
    lede: "An option is a contract that gives the buyer the right, but not the obligation, to buy or sell an underlying asset at a fixed price before a set expiry — one of the most flexible, and most misunderstood, instruments in trading.",
    body: `
      <h2 id="basics">Calls and puts</h2>
      <p>A <strong>call option</strong> gives the buyer the right to buy the underlying asset at a fixed "strike" price, and is typically bought when expecting the price to rise. A <strong>put option</strong> gives the buyer the right to sell at a fixed strike price, typically bought when expecting the price to fall. The seller (writer) of an option takes on the obligation on the other side of that right, in exchange for collecting a premium upfront.</p>

      <h2 id="premium">Premium and expiry</h2>
      <p>The price paid for an option is called the premium, influenced by how far the strike price is from the current price, how much time remains until expiry, and how volatile the underlying asset is expected to be. Every option has an expiry date, after which it either gets exercised or expires worthless.</p>

      <h2 id="why">Why traders use options</h2>
      <p>Options can be used to speculate on direction with limited upfront capital, to generate income by selling premium, or to hedge an existing position against adverse moves. This flexibility is also what makes options genuinely complex — the same basic tools can be combined into a wide range of strategies with very different risk profiles.</p>

      <h2 id="risk">Risk considerations</h2>
      <p>Buying an option risks, at most, the premium paid — a defined, limited loss. Selling (writing) an option can carry substantially larger, sometimes theoretically unlimited risk if the market moves sharply against the position, making option writing a strategy that demands a solid grasp of <a href="article.html?slug=risk-management">risk management</a> before attempting it.</p>
    `
  },

  "futures-trading": {
    lede: "A futures contract is an agreement to buy or sell an asset at a predetermined price on a specific future date — unlike an option, both sides are obligated to fulfill the contract.",
    body: `
      <h2 id="what">What a futures contract is</h2>
      <p>Futures are standardized contracts traded on an exchange, specifying the asset, quantity, and settlement date in advance. Both the buyer and seller are obligated to honor the contract's terms at expiry, unless the position is closed out before then.</p>

      <h2 id="leverage">Leverage and margin</h2>
      <p>Futures trading typically requires only a fraction of the contract's full value upfront, called margin — providing significant leverage. This magnifies both potential gains and potential losses relative to the capital actually committed, similar in principle to <a href="article.html?slug=mis">MIS</a> but structurally built into the futures contract itself.</p>

      <h2 id="uses">Common uses</h2>
      <p>Futures are used to speculate on price direction with leverage, and also to hedge — a business that needs a commodity in three months can lock in today's price using a futures contract, protecting itself from adverse price moves before the actual purchase happens.</p>

      <h2 id="oi">Open interest and expiry</h2>
      <p>Because futures have a fixed date, traders often watch <a href="article.html?slug=open-interest">open interest</a> shift as expiry approaches, as positions get rolled into a later contract or closed out entirely.</p>
    `
  },

  "commodities": {
    lede: "Commodity markets trade physical goods — metals, energy, agricultural produce — usually through standardized futures contracts rather than the actual physical delivery of goods.",
    body: `
      <h2 id="categories">Broad categories</h2>
      <p>Commodities are generally grouped into <strong>metals</strong> (gold, silver, copper), <strong>energy</strong> (crude oil, natural gas), and <strong>agricultural</strong> products (cotton, spices, grains). Each category is influenced by a different set of supply and demand factors — geopolitics and industrial demand for metals and energy, weather and harvest cycles for agricultural products.</p>

      <h2 id="how">How commodities are traded</h2>
      <p>Most retail commodity trading happens through futures contracts on dedicated commodity exchanges, rather than buying and storing the physical good itself. This lets traders speculate on price movement or hedge exposure without the practical logistics of handling barrels of oil or sacks of grain.</p>

      <h2 id="why">Why commodities matter beyond direct trading</h2>
      <p>Commodity prices — crude oil especially — feed directly into broader <a href="article.html?slug=inflation">inflation</a> and currency dynamics, which is why commodity moves are watched closely even by traders who never directly trade commodities themselves.</p>
    `

  "currency-markets": {

      <h2 id="pairs">Currency pairs</h2>
      <p>Currencies are always traded in pairs — USD/INR, for example, expresses how many rupees one US dollar can buy. A rising USD/INR means the rupee is weakening against the dollar; a falling USD/INR means it's strengthening.</p>

      <h2 id="drivers">What moves currency prices</h2>
      <p>Currency values are influenced by interest rate differentials between countries, trade balances, inflation expectations, and overall risk sentiment — capital tends to flow toward currencies offering attractive returns and perceived safety, and away from those seen as riskier or offering lower returns.</p>

      <h2 id="india">Currency trading in India</h2>

  "forex-basics": {
    lede: "Forex (foreign exchange) is the global, decentralized market where currencies are traded around the clock — operating differently from a centralized exchange like NSE or BSE.",
    body: `
      <h2 id="decentralized">A decentralized, 24-hour market</h2>
      <p>Unlike equity markets with fixed hours on a single exchange, forex trades across a network of banks, brokers, and institutions worldwide, operating nearly continuously as different regional sessions (Asian, European, American) overlap throughout the day.</p>

      <h2 id="majors">Major currency pairs</h2>
      <p>The most heavily traded pairs — often called "majors" — involve the US dollar paired against other major currencies like the euro, yen, or pound. These pairs typically offer the tightest spreads and highest liquidity.</p>

      <h2 id="leverage">Leverage in forex</h2>
      <p>Forex trading is often associated with very high leverage offered by international brokers — far higher than what's typically available in equity markets — which significantly magnifies both potential gains and losses, and demands correspondingly strict risk management.</p>

      <h2 id="india-note">A note for Indian traders</h2>
      <p>Indian residents are subject to regulatory restrictions on forex trading through overseas brokers under RBI's foreign exchange rules — most retail currency exposure in India happens instead through the exchange-traded currency derivatives covered in <a href="article.html?slug=currency-markets">Currency Markets</a>.</p>
    `

      <p>Crypto is typically traded on dedicated crypto exchanges, distinct from traditional stock brokers, using either direct spot purchases or, on more advanced platforms, derivatives similar to the futures and options covered elsewhere in this section.</p>

      <h2 id="regulatory">Regulatory status in India</h2>

  "etfs": {
    lede: "An Exchange-Traded Fund (ETF) is a basket of securities — often tracking an index — that trades on an exchange just like an individual stock.",
    body: `
      <h2 id="what">What an ETF is</h2>
      <p>An ETF pools money from many investors to hold a diversified basket of underlying assets, typically designed to track the performance of an index like the <a href="article.html?slug=indices">NIFTY 50</a>. Buying one unit of the ETF gives proportional exposure to the entire underlying basket.</p>

      <h2 id="vs-stocks">ETFs vs individual stocks</h2>
      <p>Unlike buying individual stocks, an ETF spreads risk across many holdings in a single transaction, reducing the impact of any one company performing badly. It still trades throughout the day like a stock, with a live, fluctuating price — unlike a mutual fund, which is priced only once a day.</p>

      <h2 id="why">Why traders and investors use ETFs</h2>
      <p>ETFs offer low-cost, instantly diversified exposure to an entire index or sector without needing to buy each underlying stock individually, making them a common tool for both long-term investors seeking broad market exposure and traders looking to express a view on an entire sector at once.</p>
    `

  "mutual-funds": {
    lede: "A mutual fund pools money from many investors and invests it according to a stated strategy, managed by a professional fund manager — priced and transacted once per day rather than continuously.",

      <h2 id="what">What a mutual fund is</h2>
      <p>Investors buy units of the fund, and the fund manager decides how to allocate the pooled money across stocks, bonds, or other assets according to the fund's stated objective — growth, income, a specific sector focus, and so on.</p>

      <h2 id="active-passive">Active vs passive funds</h2>
      <p>An <strong>actively managed</strong> fund has a manager making ongoing decisions to try to outperform a benchmark index. A <strong>passive</strong> fund (often structured as an <a href="article.html?slug=etfs">index fund</a>) simply tracks an index's holdings directly, aiming to match its performance rather than beat it, typically at a lower cost.</p>

      <h2 id="vs-etf">Mutual funds vs ETFs</h2>
      <p>The core structural difference is pricing frequency: mutual fund units are bought and sold at a single price calculated at the end of each trading day (the NAV, or Net Asset Value), while ETFs trade continuously throughout the day at fluctuating market prices, much like a stock.</p>

      <h2 id="next">Where to go next</h2>

  "economic-indicators": {

    body: `
      <h2 id="why">Why they matter to markets</h2>
      <p>Markets are forward-looking, and economic indicators are one of the clearest windows into where an economy is actually heading. A weaker-than-expected data release can shift expectations about interest rates, corporate earnings, or overall risk appetite within minutes of being published.</p>

      <h2 id="types">Types of indicators</h2>
      <p><strong>Leading indicators</strong> (like new orders or stock prices themselves) tend to shift before the broader economy does. <strong>Lagging indicators</strong> (like unemployment rate) confirm trends after they're already underway. <strong>Coincident indicators</strong> (like <a href="article.html?slug=gdp">GDP</a>) move roughly in step with the economy in real time.</p>

      <h2 id="key">Key indicators covered in this Codex</h2>
      <p>The entries ahead cover <a href="article.html?slug=inflation">inflation</a>, <a href="article.html?slug=interest-rates">interest rates</a>, <a href="article.html?slug=gdp">GDP</a>, and <a href="article.html?slug=cpi">CPI</a> — the handful of releases most consistently watched by Indian and global market participants alike.</p>

  "inflation": {
    lede: "Inflation measures how quickly prices for goods and services rise over time, eroding the purchasing power of money — and it's one of the most consistently market-moving economic themes.",
    body: `
      <h2 id="what">What inflation is</h2>
      <p>When inflation is 6% annually, something that cost ₹100 a year ago now costs roughly ₹106 — the same amount of money buys slightly less than before. Moderate inflation is considered normal and even healthy in a growing economy; persistently high inflation erodes savings and purchasing power.</p>

      <h2 id="causes">What drives it</h2>
      <p>Inflation can be driven by demand outpacing supply ("demand-pull"), rising input costs like wages or commodities getting passed on to consumers ("cost-push"), or simply an increase in the overall money supply relative to the goods and services available to buy with it.</p>

      <h2 id="markets">Why markets react to inflation data</h2>
      <p>Inflation data heavily influences central bank decisions on <a href="article.html?slug=interest-rates">interest rates</a> — higher-than-expected inflation often raises expectations of rate hikes, which can pressure both equity and bond markets, since higher rates make borrowing more expensive and future company earnings less valuable in today's terms.</p>
    `

  "interest-rates": {
    lede: "Interest rates — set primarily by a country's central bank — represent the cost of borrowing money, and they ripple through nearly every corner of financial markets.",
    body: `
      <h2 id="what">What interest rates are</h2>
      <p>In India, the Reserve Bank of India (RBI) sets a benchmark policy rate (the repo rate) that influences the interest rates banks charge on loans and offer on deposits throughout the economy. Central banks adjust this rate primarily to manage inflation and support economic growth.</p>

      <h2 id="markets">How rate changes affect markets</h2>
      <p>Lower interest rates generally make borrowing cheaper for companies and consumers, which can boost economic activity and corporate earnings, often supporting equity prices. Higher rates raise borrowing costs and make relatively "safer" fixed-income investments more attractive by comparison, which can pressure equity valuations.</p>

      <h2 id="global">Global interest rate dynamics</h2>
      <p>Interest rate decisions in major economies, particularly the US Federal Reserve, influence global capital flows — higher US rates, for example, can draw investment away from emerging markets like India in search of better risk-adjusted returns elsewhere, affecting both the rupee and Indian equities.</p>
    `

    body: `
      <h2 id="what">What GDP measures</h2>
      <p>GDP adds up consumption, investment, government spending, and net exports to arrive at a single figure representing total economic output. GDP growth rate — how much this figure has increased compared to a prior period — is what's typically reported and watched.</p>

      <h2 id="why">Why it matters to markets</h2>
      <p>Strong GDP growth generally signals a healthy economy, supporting corporate earnings and investor confidence. Slowing or negative GDP growth (a contraction, and two consecutive quarters of contraction is one common definition of a recession) tends to weigh on markets, since it suggests weaker demand and earnings ahead.</p>

      <h2 id="limits">What GDP doesn't capture</h2>
      <p>GDP measures the size of economic activity, but says relatively little about its distribution, sustainability, or quality — a useful headline number, but only one part of a fuller economic picture alongside indicators like <a href="article.html?slug=inflation">inflation</a> and employment data.</p>

      <h2 id="what">What CPI measures</h2>
      <p>Statistical agencies track the prices of a representative basket of everyday items — food, housing, transportation, and more — over time. The percentage change in this basket's total cost from one period to the next is the CPI inflation rate.</p>

      <h2 id="release">Why CPI releases move markets</h2>
      <p>CPI is one of the most closely watched data releases globally because central banks use it directly to guide <a href="article.html?slug=interest-rates">interest rate</a> decisions. A CPI reading that comes in higher than expected often triggers an immediate market reaction, on expectations that rates may need to rise (or stay higher for longer) to bring inflation back under control.</p>

      <h2 id="core">Core CPI</h2>

    lede: "A corporate action is any event initiated by a listed company that directly affects its shareholders or its shares — from paying a dividend to restructuring the share count itself.",

      <h2 id="what">What counts as a corporate action</h2>
      <p>Corporate actions range from routine (a regular dividend payment) to structural (a stock split or rights issue) to transformative (a merger or acquisition). Each type affects shareholders differently, and each is announced publicly in advance.</p>

      <h2 id="categories">Broad categories</h2>
      <p>This section covers the most common types: <a href="article.html?slug=dividends">dividends</a> (a cash payout to shareholders), <a href="article.html?slug=bonus-shares">bonus shares</a> and <a href="article.html?slug=stock-splits">stock splits</a> (which change the share count without changing the company's underlying value), and <a href="article.html?slug=rights-issues">rights issues</a> (a way for the company to raise additional capital from existing shareholders).</p>

      <h2 id="why">Why they matter to traders</h2>
      <p>Corporate actions typically trigger adjustments to a stock's price and sometimes its historical chart data, and can significantly affect short-term trading activity around the announcement and record dates — worth checking before trading a stock with an upcoming corporate action.</p>

  "dividends": {
    lede: "A dividend is a portion of a company's profit distributed directly to shareholders — one of the two ways (alongside share price appreciation) that equity ownership can generate a return.",
    body: `
      <h2 id="what">What a dividend is</h2>
      <p>Companies that generate consistent profit sometimes choose to return a portion of it directly to shareholders as a dividend, usually paid per share and announced by the company's board. Not all companies pay dividends — younger or high-growth companies often reinvest profits back into the business instead.</p>

      <h2 id="dates">Key dates</h2>
      <p>A dividend announcement typically includes a <strong>record date</strong> (the cutoff for being registered as a shareholder eligible for the dividend) and an <strong>ex-dividend date</strong> (the first day a stock trades without the dividend attached, after which new buyers won't receive that specific payout).</p>

      <h2 id="yield">Dividend yield</h2>
      <p>Dividend yield expresses the annual dividend as a percentage of the current share price, giving a rough sense of the cash return an investor receives purely from dividends, separate from any change in the share price itself.</p>

  "bonus-shares": {
    lede: "Bonus shares are additional shares issued to existing shareholders for free, in a fixed ratio to what they already hold — increasing share count without shareholders paying anything extra.",
    body: `
      <h2 id="what">What bonus shares are</h2>
      <p>A company might issue a 1:1 bonus, meaning every shareholder receives one additional free share for every share they already own. This is typically funded from the company's reserves rather than fresh capital raised from investors.</p>

      <h2 id="effect">The effect on share price</h2>
      <p>Issuing bonus shares doesn't change the company's underlying value — it simply divides the same total value across more shares. A 1:1 bonus roughly halves the share price while doubling the share count, leaving a shareholder's total holding value essentially unchanged immediately after the bonus.</p>

      <h2 id="why">Why companies issue them</h2>
      <p>Bonus issues are often used to bring a high share price down into a more accessible range for retail investors, and can also signal management's confidence in future growth, since it's a way of rewarding shareholders without spending actual cash.</p>
    `

  "stock-splits": {
    lede: "A stock split divides each existing share into multiple shares, reducing the price per share proportionally while leaving the total value of a shareholding unchanged.",
    body: `
      <h2 id="what">What a stock split is</h2>
      <p>In a 1:5 stock split, each existing share is divided into five, and the share price is adjusted to roughly one-fifth of its pre-split level. A shareholder who owned 10 shares before the split owns 50 shares after it, at a proportionally lower price each — the total value is unchanged.</p>

      <h2 id="vs-bonus">Stock splits vs bonus shares</h2>
      <p>Mechanically, splits and <a href="article.html?slug=bonus-shares">bonus shares</a> achieve a similar practical result (more shares, lower price, same total value), but they're accounted for differently on a company's books — a split changes the face value of each share, while a bonus issue capitalizes reserves into new shares.</p>

      <h2 id="why">Why companies split their stock</h2>
      <p>The most common reason is improving accessibility and liquidity — a very high share price can discourage smaller retail investors from buying a meaningful number of shares, and a split brings the per-share price down without affecting the company's actual market value.</p>

      <p>A company might announce a rights issue in a ratio like 1:4 — meaning shareholders can buy one new share for every four they already own, at a price typically set below the current market price as an incentive to participate.</p>

      <h2 id="why">Why companies do this</h2>
      <p>Rights issues are a way to raise fresh capital directly from existing shareholders, often used when a company wants to fund growth or reduce debt without necessarily diluting ownership for shareholders who choose to participate fully in the offer.</p>

      <h2 id="choice">The shareholder's choice</h2>
      <p>Shareholders can subscribe to their full entitlement, subscribe partially, sell their "rights" to someone else if the rights themselves are tradable, or let the entitlement lapse — each option has different implications for their eventual ownership percentage in the company.</p>

  "quarterly-results": {
    lede: "Quarterly results are a listed company's periodic financial disclosures, published four times a year, giving the market a regular, structured update on how the business is actually performing.",
    body: `
      <h2 id="what">What's included</h2>
      <p>Quarterly results typically include revenue, profit, expenses, and other key financial metrics for the three-month period, often compared against both the previous quarter and the same quarter a year earlier to show growth trends.</p>

      <h2 id="why">Why they matter</h2>
      <p>Because so much of a stock's price is based on expectations about future performance, quarterly results are one of the clearest, most concrete opportunities for the market to check those expectations against actual, audited numbers — which is why prices can move sharply around results, even for companies with no other news.</p>

      <h2 id="reaction">Reading the market's reaction</h2>
      <p>A stock can fall even after reporting a genuine profit increase if the results missed what the market had already priced in, and can rise on weak results if they beat unusually pessimistic expectations — it's the gap between actual results and prior expectations that typically drives the immediate price reaction, not the absolute numbers alone.</p>

      <h2 id="components">What's in an earnings report</h2>

      <p>Many companies also hold an earnings call or conference shortly after releasing results, where management discusses performance and answers questions from analysts — often containing forward-looking commentary ("guidance") that can move the stock as much as the historical numbers themselves.</p>

      <h2 id="using">How traders and investors use earnings reports</h2>
      <p>Beyond the immediate price reaction, earnings reports are a primary input for <a href="article.html?slug=fundamental-analysis">fundamental analysis</a> — tracking a company's performance over several quarters helps build a picture of whether a business is genuinely improving, stagnating, or declining, independent of short-term price movement.</p>

  "trading-sessions": {
    lede: "A trading session is the defined window during which an exchange is open for trading — and understanding its phases matters more than most beginners initially expect.",
    body: `
      <h2 id="what">What a trading session is</h2>
      <p>Indian exchanges operate in distinct phases each day: a pre-open session, the main continuous trading session, and a closing session — each with different rules for how orders are matched.</p>

      <h2 id="phases">The phases, briefly</h2>
      <p>The <strong>pre-open session</strong> (roughly the first 15 minutes) collects orders and determines an opening price through a call auction, rather than continuous matching. The <strong>regular session</strong> that follows is where the bulk of trading happens, with orders matched continuously in real time. A brief <strong>closing session</strong> determines the official closing price.</p>

      <h2 id="why">Why session timing matters</h2>
      <p>Volatility and liquidity aren't constant throughout the day — the opening minutes often see sharp moves as overnight information gets priced in, while liquidity can thin out around the middle of the session. Being aware of which phase the market is in helps set realistic expectations for how an order might behave.</p>
    `

  "market-timings": {
    lede: "Indian equity markets run on a fixed daily schedule — worth knowing precisely, since orders placed outside these windows behave differently from what many beginners expect.",
    body: `
      <h2 id="timings">Standard timings</h2>
      <p>NSE and BSE equity markets have historically operated with a pre-open session from 9:00–9:15 AM IST, followed by continuous trading from 9:15 AM to 3:30 PM IST, and a closing session immediately after. Exchanges occasionally announce special sessions (such as for Muhurat trading during Diwali) — always worth checking current exchange notices rather than assuming timings never change.</p>

      <h2 id="preopen">The pre-open session in practice</h2>
      <p>Orders placed during the pre-open window are collected and matched through a single opening auction rather than executed instantly, which is why prices can occasionally show unusual behavior in the first few minutes before settling into the regular session's continuous matching.</p>

      <h2 id="derivatives">Derivatives and commodity timings</h2>
      <p>Currency and commodity derivatives markets in India often run on different hours than the equity segment, sometimes extending into the evening — a detail worth confirming for the specific segment being traded rather than assuming it matches equity hours.</p>
    `

  "world-market-time-zones": {
    lede: "Because exchanges around the world open and close at different local times, there's a near-continuous rotation of active markets across the trading day — and Indian markets don't move in isolation from this global sequence.",
    body: `
      <h2 id="sequence">The daily global sequence</h2>
      <p>As one region's trading day winds down, another is just beginning — Asian markets (Tokyo, Hong Kong, and India within this broader window) open first, followed by European markets (London), followed by American markets (New York), before the cycle repeats. This creates substantial overlap between regions during parts of the day.</p>

      <h2 id="cues">Why this affects Indian markets</h2>
      <p>Because Indian markets open after major Asian markets but before European and American markets, overnight developments in the US — captured in the closing levels of markets like the NYSE and NASDAQ, discussed in <a href="article.html?slug=global-exchanges">Global Exchanges</a> — are often the first thing Indian traders check before the local market opens, feeding into what's commonly called "global cues."</p>

      <h2 id="practical">A practical takeaway</h2>
      <p>Significant overnight moves in US markets, commodity prices, or currency markets frequently show up as a gap at the Indian market open the next morning — one more reason global market awareness matters even for traders who exclusively trade Indian stocks.</p>
    `

  "taxation-basics": {
    lede: "Trading and investment gains in India are taxed differently depending on holding period and activity type — a subject where getting the general framework right matters, even though exact rates and rules can change and should be verified against current official guidance.",
    body: `
      <h2 id="stcg-ltcg">Short-term vs long-term capital gains</h2>
      <p>Gains on listed equity shares are generally classified as <strong>short-term capital gains (STCG)</strong> if held below a defined threshold period, or <strong>long-term capital gains (LTCG)</strong> if held beyond it — with each category taxed at different rates. These thresholds and rates are set by government policy and have changed over time, so current, official sources should always be checked rather than relying on a fixed number.</p>

      <h2 id="speculative">Speculative vs non-speculative income</h2>
      <p>Intraday equity trading is generally treated as <strong>speculative business income</strong> for tax purposes, while <a href="article.html?slug=futures-trading">futures</a> and <a href="article.html?slug=options-trading">options</a> trading is generally treated as <strong>non-speculative business income</strong> — each with different rules for how gains, losses, and expenses are treated.</p>

      <h2 id="stt">Securities Transaction Tax</h2>
      <p>STT, briefly introduced in <a href="article.html?slug=brokers">Brokers</a>, is deducted automatically on every exchange trade and is separate from income tax on trading gains.</p>

      <h2 id="disclaimer">A note on staying current</h2>
      <p>Tax rules around trading and investing are updated periodically through government policy changes. This entry describes the general framework, not current exact rates — always confirm specifics with a qualified tax professional or official government sources before filing.</p>

  "faq": {
    lede: "Straight answers to the questions that come up most often before someone places their first trade.",
    body: `
      <h2 id="q1">Is trading the same as gambling?</h2>
      <p>Not if it's approached with a process — defined risk, consistent position sizing, and a plan followed over many trades. Without that process, trading and gambling become difficult to tell apart. See <a href="article.html?slug=what-is-trading">What Is Trading</a> for a fuller answer.</p>

      <h2 id="q2">How much money do I need to start?</h2>
      <p>There's no fixed minimum required by exchanges themselves, though brokers may have their own account minimums, and practical position sizing (covered in <a href="article.html?slug=position-sizing">Position Sizing</a>) works better with enough capital to meaningfully diversify risk across trades rather than concentrating everything in one position.</p>

      <h2 id="q3">What's the best timeframe for a beginner?</h2>
      <p>Most experienced traders suggest beginners start with <a href="article.html?slug=swing-trading">swing trading</a> or <a href="article.html?slug=long-term-investing">long-term investing</a> rather than <a href="article.html?slug=intraday-trading">intraday trading</a> or <a href="article.html?slug=scalping">scalping</a>, since slower timeframes leave more room to think clearly and learn from mistakes without the pressure of split-second decisions.</p>

      <h2 id="q4">Can trading make me rich quickly?</h2>
      <p>Consistent profitability, when it happens, is typically built over years through <a href="article.html?slug=risk-management">risk management</a>, discipline, and compounding — not through a single lucky trade. Approaches promising fast, guaranteed riches are a common warning sign worth treating with skepticism.</p>
    `

  "common-beginner-mistakes": {
    lede: "A handful of mistakes account for a disproportionate share of avoidable losses among new traders — recognizing them in advance is far cheaper than learning them the hard way.",
    body: `
      <h2 id="list">The most common mistakes</h2>
      <p><strong>Trading without a stop-loss</strong> — a single unchecked losing trade can wipe out weeks of gains. <strong>Oversizing positions</strong> relative to account size, turning a normal losing trade into a serious setback. <strong>Trading without a plan</strong>, entering on impulse rather than a defined setup. <strong>Chasing tips</strong> from social media or acquaintances without independent analysis. <strong>Overtrading</strong> out of boredom rather than genuine opportunity, covered in <a href="article.html?slug=overtrading">Overtrading</a>. <strong>Ignoring transaction costs</strong>, which quietly erode returns for frequent traders. <strong>Revenge trading</strong> after a loss, covered in <a href="article.html?slug=revenge-trading">Revenge Trading</a>.</p>

      <h2 id="pattern">The pattern behind most of these</h2>
      <p>Nearly every mistake on this list traces back to skipping a plan made in advance and instead making decisions reactively, under emotional pressure — which is exactly why the <a href="article.html?slug=risk-management">Risk & Psychology</a> section exists as its own major part of this Codex.</p>
    `
  },

  "professional-trading-checklist": {
    lede: "A simple, repeatable checklist — used consistently before, during, and after every trade — closes many of the gaps that cause avoidable losses.",
    body: `
      <h2 id="pre-market">Before the market opens</h2>
      <p>Review overnight global cues and any relevant news; check the economic calendar for scheduled data releases; identify key support and resistance levels on the watchlist.</p>

      <h2 id="pre-trade">Before entering a trade</h2>
      <p>Confirm the setup matches a defined strategy, not impulse; set the stop-loss and target before entry, not after; calculate position size based on account risk rules, not a round number that feels convenient.</p>

      <h2 id="post-trade">After closing a trade</h2>
      <p>Record the trade in a <a href="article.html?slug=trading-journal">trading journal</a> regardless of outcome; note whether the original plan was actually followed; avoid immediately re-entering the market out of impulse, especially after a loss.</p>
    `
  },

  "trading-plan-template": {
    lede: "A trading plan turns vague intentions into specific, checkable rules — written in a calm moment, to be followed in less calm ones.",
    body: `
      <h2 id="components">What a trading plan should include</h2>
      <p><strong>Goals</strong> — realistic, time-bound, and separate from any single trade's outcome. <strong>Markets and instruments</strong> — which stocks, sectors, or products you'll actually trade. <strong>Entry criteria</strong> — the specific, repeatable conditions that trigger a trade. <strong>Risk rules</strong> — maximum risk per trade and per day, and rules for position sizing. <strong>Exit criteria</strong> — both stop-loss and target, defined before entry. <strong>Review process</strong> — how and when performance will be assessed.</p>

      <h2 id="using">Using the template</h2>
      <p>A plan is only useful if it's specific enough to check objectively after the fact — "trade good setups" isn't a rule; "enter only after a confirmed <a href="article.html?slug=break-of-structure">break of structure</a> with volume above the 20-day average" is.</p>
    `
  },

  "daily-routine": {
    lede: "A consistent daily routine turns trading from a reactive, ad-hoc activity into a repeatable process — reducing the number of decisions made under pressure during the trading session itself.",
    body: `
      <h2 id="before">Before the market opens</h2>
      <p>Review the prior session's closing levels and overnight global cues, scan the watchlist for setups forming near key levels, and confirm the day's risk limits before placing a single trade.</p>

      <h2 id="during">During the trading session</h2>
      <p>Execute only pre-identified setups rather than reacting to every price movement, and track trades as they happen rather than relying on memory at the end of the day.</p>

      <h2 id="after">After the market closes</h2>
      <p>Update the <a href="article.html?slug=trading-journal">trading journal</a> with every trade taken, note any plan deviations honestly, and prepare a fresh watchlist for the next session rather than starting from scratch the next morning.</p>
    `
  },

  "weekly-routine": {
    lede: "A weekly review steps back from individual trades to check whether the broader process is actually working — a level of reflection daily routines don't naturally capture.",
    body: `
      <h2 id="review">What to review weekly</h2>
      <p>Total trades taken, win rate, and average <a href="article.html?slug=risk-reward-ratio">risk-reward</a> achieved versus planned; whether particular setups or times of day performed noticeably better or worse; and whether emotional patterns — like <a href="article.html?slug=overtrading">overtrading</a> after a losing day — showed up repeatedly.</p>

      <h2 id="adjust">Making adjustments</h2>
      <p>A weekly review is the natural point to make small, deliberate adjustments to a trading plan based on real, accumulated evidence — rather than changing strategy mid-week based on a single trade's outcome.</p>
    `
  },

  "monthly-review": {
    lede: "A monthly review looks at performance over a long enough window to separate genuine skill and process issues from ordinary short-term variance.",
    body: `
      <h2 id="metrics">Metrics worth tracking monthly</h2>
      <p>Overall account performance, maximum drawdown experienced during the month, consistency of position sizing relative to the trading plan, and how closely actual behavior matched the written plan across the full month rather than any single week.</p>

      <h2 id="why">Why a longer window matters</h2>
      <p>Even a genuinely sound strategy can have a losing week purely by chance — a monthly (and ideally quarterly) view helps separate normal variance from an actual problem with the strategy or its execution, avoiding the trap of abandoning a sound approach too early or sticking with a flawed one too long.</p>
    `

  "books-and-documentaries": {

    body: `

      <h2 id="documentaries">Documentaries</h2>
      <p><strong>"Inside Job"</strong> (2010) — an Academy Award-winning examination of the causes of the 2008 global financial crisis. <strong>"Betting on Zero"</strong> — a look at short-selling and activist investing through a specific, controversial case study.</p>

      <h2 id="note">A note on how to use these</h2>
      <p>None of these replace a structured understanding of the fundamentals covered elsewhere in this Codex — they're best read alongside, or after, building that base, rather than as a substitute for it.</p>

      <h2 id="official">Official and regulatory resources</h2>

      <h2 id="podcasts">Podcasts and channels</h2>
      <p>Look for resources that focus on process, risk management, and honest discussion of losses — not just highlight-reel wins. A consistent warning sign across podcasts, channels, and courses alike is content that promises guaranteed returns or downplays risk; genuinely useful trading education spends real time on what goes wrong.</p>

      <h2 id="courses">Structured courses</h2>
      <p>Many legitimate courses exist, but so do many low-quality ones sold primarily through aggressive marketing rather than merit — checking for verifiable track records and realistic claims (not guaranteed profits) is a reasonable filter before paying for one.</p>
    `

      <h2 id="news">News and data sources</h2>
      <p>Reliable financial news sources and company filing databases help separate genuine information from rumor — official exchange announcements (NSE and BSE both publish company filings directly) are a particularly trustworthy primary source.</p>

      <h2 id="regulatory">Regulatory resources</h2>
      <p>The SEBI, NSE, and BSE websites all publish official circulars, investor education material, and company disclosures directly — worth bookmarking as a first stop for anything regulatory or company-specific.</p>
    `

  "economic-calendar": {
    lede: "An economic calendar lists upcoming scheduled data releases and events — interest rate decisions, inflation data, earnings dates — that are likely to move markets.",
    body: `
      <h2 id="what">What it shows</h2>
      <p>A typical economic calendar entry includes the event name, scheduled date and time, the previous reading, and (often) a consensus forecast from economists — letting traders see not just what's coming, but what the market is already expecting.</p>

      <h2 id="use">How traders use it</h2>
      <p>Checking a calendar before entering a position helps avoid unknowingly holding a trade through a high-impact event like an <a href="article.html?slug=interest-rates">interest rate</a> decision or major economic data release, both of which can cause sharp, unpredictable volatility.</p>

      <h2 id="reaction">Why the "surprise" matters more than the number</h2>
      <p>As with <a href="article.html?slug=quarterly-results">quarterly results</a>, markets tend to react to the gap between the actual reading and the consensus forecast, not the absolute number alone — a weak reading that was already expected often causes far less reaction than a strong reading nobody saw coming.</p>
    `
  },

  "position-size-calculator": {
    lede: "A position size calculator turns the account-risk and stop-loss decisions covered in Position Sizing into a quick, repeatable calculation — removing the temptation to skip the math under time pressure.",
    body: `
      <h2 id="recap">The core formula</h2>
      <p>As covered in <a href="article.html?slug=position-sizing">Position Sizing</a>: position size (in shares) equals the rupee amount you're willing to risk on the trade, divided by the rupee distance between your entry price and your stop-loss.</p>

      <h2 id="why-tool">Why a dedicated tool helps</h2>
      <p>Doing this calculation manually, in the moment, while a trade setup is developing, is exactly the kind of step that gets skipped under time pressure — a calculator (built into many broker platforms, or as a simple standalone spreadsheet) makes it fast enough that there's no excuse to skip it.</p>

      <h2 id="closing">A closing note</h2>
      <p>This entry closes the initial index of the Codex. Every section from <a href="index.html#browse">Foundations through Reference & Tools</a> is meant to be revisited as often as needed — trading knowledge compounds the same way capital does, a little at a time, consistently applied.</p>
    `

<script>

      // Build TOC from h2 headings

  }
